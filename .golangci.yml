version: "2"
linters:
  default: none
  enable:
    - errcheck
    - staticcheck
    - gosec
    - govet
    - revive
    - unused
    - bodyclose
    - noctx
  settings:
    gosec:
      excludes:
        - G304 # file path from variable — expected in scanner context
    revive:
      rules:
        - name: exported
          severity: warning
        - name: unused-parameter
          severity: warning

formatters:
  enable:
    - gofmt

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
