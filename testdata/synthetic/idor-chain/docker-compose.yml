version: "3.8"
services:
  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      - ORDERS_SERVICE_URL=http://orders:5000
    depends_on:
      - orders

  orders:
    build: ./orders
    ports:
      - "5000:5000"
    environment:
      - PAYMENT_SERVICE_URL=http://payment:8090
      - DB_DSN=postgresql://admin:P@ssw0rd!@db:5432/orders
    depends_on:
      - db
      - payment

  payment:
    build: ./payment
    ports:
      - "8090:8090"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/payments
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=P@ssw0rd!
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=P@ssw0rd!
