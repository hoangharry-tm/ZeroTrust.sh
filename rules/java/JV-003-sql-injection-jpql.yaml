# Variants covered: V1 V2 V4 V5 V7 V9
# Variants NOT covered:
#   V3 (dynamic EntityManager accessor — too broad without full class hierarchy)
#   V6 (conditional JPQL assembly with branch-dependent injection — Path B semantic)
#   V8 (reflection reaching EntityManager — very rare; deferred to Approach 2 Joern)
#
# Detection strategy:
#   Rule A (taint): Spring MVC request annotation sources and HttpServletRequest
#     accessors → EntityManager.createQuery() / createNativeQuery() sinks.
#   Rule B (inline concat): String concat / String.format() directly inside the
#     createQuery() / createNativeQuery() call — the most common AI-generated pattern.
#   Rule C (variable concat): JPQL string assembled via +=, concat(), or
#     StringBuilder.append() in a visible scope before being passed to EM.
#   Rule D (V2 aliased EM): @PersistenceContext-injected EntityManager used with
#     the same concat patterns.
#
# SAFE PATTERNS (excluded by pattern-not):
#   - TypedQuery with setParameter() — uses JPA named parameters, safe.
#   - @Query("SELECT ... WHERE x = :param") — static JPQL string, safe.
#   - EntityManager.createQuery("STATIC STRING") — no concat, safe.
#   - Spring Data JpaRepository.findBy*() — generated queries, safe.
#
# KNOWN LIMITATIONS:
#   - JPQL assembled in a helper/service method then passed to a controller
#     requires inter-procedural analysis in Path B Joern.

rules:
  # ── Rule A: taint mode — Spring sources → EntityManager createQuery sinks ─────
  - id: JV-003-sql-injection-jpql-taint
    message: |
      HTTP request data flows into EntityManager.createQuery() or
      createNativeQuery() via String concatenation, enabling JPQL/SQL injection.
      An attacker can manipulate the query to bypass authorization checks, read
      or delete arbitrary records, or (with native queries) execute DDL statements.
      Fix: use TypedQuery with named parameters (setParameter()) or Spring Data
      Repository methods with @Query using ':param' notation.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp: "A03:2021 - Injection"
      category: sql-injection
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    mode: taint
    pattern-sources:
      # V9 — Spring MVC request annotation parameters
      - pattern: |
          $RT $METHOD(@RequestParam $PT $P, ...) { ... }
        focus-metavariable: $P
      - pattern: |
          $RT $METHOD(@RequestBody $PT $P, ...) { ... }
        focus-metavariable: $P
      - pattern: |
          $RT $METHOD(@PathVariable $PT $P, ...) { ... }
        focus-metavariable: $P
      - pattern: |
          $RT $METHOD(@RequestHeader $HT $P, ...) { ... }
        focus-metavariable: $P
      # V1 — HttpServletRequest accessors
      - pattern: $REQ.getParameter(...)
      - pattern: $REQ.getParameterValues(...)
      - pattern: $REQ.getQueryString()
      - pattern: $REQ.getHeader(...)
    pattern-sinks:
      # V1 — EntityManager.createQuery()
      - pattern: $EM.createQuery($JPQL)
        focus-metavariable: $JPQL
      - pattern: $EM.createQuery($JPQL, $CLASS)
        focus-metavariable: $JPQL
      # V1 — EntityManager.createNativeQuery()
      - pattern: $EM.createNativeQuery($SQL)
        focus-metavariable: $SQL
      - pattern: $EM.createNativeQuery($SQL, $CLASS)
        focus-metavariable: $SQL
      - pattern: $EM.createNativeQuery($SQL, $RMAP)
        focus-metavariable: $SQL
    pattern-sanitizers:
      # Safe: TypedQuery parameter binding
      - pattern: $Q.setParameter(...)
      # Safe: Spring Data @Query with named params (detected upstream, not here)

  # ── Rule B: inline String concat / String.format() in createQuery*() ─────────
  - id: JV-003-sql-injection-jpql-inline-concat
    message: |
      A String concatenation expression or String.format() call is passed directly
      as the JPQL/SQL argument to EntityManager.createQuery() or
      createNativeQuery(). If any operand derives from user input, this is a
      JPQL/SQL injection vulnerability.
      Fix: use TypedQuery with setParameter() named-parameter binding.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp: "A03:2021 - Injection"
      category: sql-injection
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-either:
          # V1/V5 — String concat directly in createQuery()
          - pattern: $EM.createQuery($A + $B)
          - pattern: $EM.createQuery($A + $B, $CLASS)
          # V5 — String.format() in createQuery()
          - pattern: $EM.createQuery(String.format($FMT, $ARGS))
          - pattern: $EM.createQuery(String.format($FMT, $ARGS), $CLASS)
          # V1/V5 — String concat directly in createNativeQuery()
          - pattern: $EM.createNativeQuery($A + $B)
          - pattern: $EM.createNativeQuery($A + $B, $CLASS)
          # V5 — String.format() in createNativeQuery()
          - pattern: $EM.createNativeQuery(String.format($FMT, $ARGS))
          - pattern: $EM.createNativeQuery(String.format($FMT, $ARGS), $CLASS)
          # V5 — formatted() (Java 15+) in createQuery()
          - pattern: $EM.createQuery($FMT.formatted($ARGS))
          - pattern: $EM.createNativeQuery($FMT.formatted($ARGS))
      # Exclude typed query with setParameter — safe parameterized pattern
      - pattern-not: |
          TypedQuery<$T> $Q = $EM.createQuery($JPQL, $CLASS);
          ...
          $Q.setParameter($NAME, $VAL);
          ...
      - pattern-not: |
          Query $Q = $EM.createQuery($JPQL);
          ...
          $Q.setParameter($NAME, $VAL);
          ...
      # Exclude fluent setParameter chaining — also safe
      - pattern-not: $EM.createQuery($JPQL, $CLASS).setParameter($NAME, $VAL)
      - pattern-not: $EM.createQuery($JPQL).setParameter($NAME, $VAL)

  # ── Rule C: V4 — JPQL string assembled via StringBuilder / += before EM call ──
  - id: JV-003-sql-injection-jpql-stringbuilder
    message: |
      A JPQL or SQL string is assembled using StringBuilder.append() or string
      concatenation (+=) and then passed to EntityManager.createQuery() or
      createNativeQuery(). If any appended fragment derives from user input, this
      allows JPQL/SQL injection.
      Fix: restructure with TypedQuery named parameters; never assemble query
      strings by appending user-supplied values.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp: "A03:2021 - Injection"
      category: sql-injection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    patterns:
      - pattern-either:
          # V4 — StringBuilder.append() then createQuery()
          - pattern: |
              StringBuilder $SB = new StringBuilder(...);
              ...
              $SB.append($VAR);
              ...
              $EM.createQuery($SB.toString());
          - pattern: |
              StringBuilder $SB = new StringBuilder(...);
              ...
              $SB.append($VAR);
              ...
              $EM.createNativeQuery($SB.toString());
          # V4 — += concatenation then createQuery()
          - pattern: |
              String $JPQL = $BASE;
              ...
              $JPQL += $VAR;
              ...
              $EM.createQuery($JPQL);
          - pattern: |
              String $JPQL = $BASE;
              ...
              $JPQL += $VAR;
              ...
              $EM.createNativeQuery($JPQL);
          # V7 — AI-agent mutation: String.concat() chaining
          - pattern: |
              String $JPQL = $BASE.concat($VAR);
              ...
              $EM.createQuery($JPQL);
          - pattern: |
              String $JPQL = $BASE.concat($VAR);
              ...
              $EM.createNativeQuery($JPQL);

  # ── Rule D: V2 — @PersistenceContext-injected EntityManager patterns ──────────
  - id: JV-003-sql-injection-jpql-persistence-context
    message: |
      An EntityManager injected via @PersistenceContext or @Autowired calls
      createQuery() or createNativeQuery() with a String argument assembled by
      concatenation or String.format(). If any fragment derives from user input,
      JPQL/SQL injection is possible.
      Fix: replace with TypedQuery setParameter() named binding.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp: "A03:2021 - Injection"
      category: sql-injection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    patterns:
      - pattern-inside: |
          class $CLS {
            @PersistenceContext
            EntityManager $EM;
            ...
          }
      - pattern-either:
          - pattern: $EM.createQuery($A + $B)
          - pattern: $EM.createQuery(String.format($FMT, $ARGS))
          - pattern: $EM.createNativeQuery($A + $B)
          - pattern: $EM.createNativeQuery(String.format($FMT, $ARGS))
