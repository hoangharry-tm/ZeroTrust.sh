# Variants covered: V1 V2 V4 V5 V7 V9
# Variants NOT covered:
#   V3 (dynamic attribute access via reflection on credential-named fields — FP risk)
#   V6 (conditional assignment: password = condition ? "hardcoded" : real —
#       path-sensitive; deferred to Path B semantic analysis)
#   V8 (reflection: Field.set(obj, "hardcoded") on credential field — deferred to
#       Approach 2 Joern taint)
#
# Detection strategy:
#   Rule A: String literal assignment to local or instance variable whose name
#     matches the credential keyword set (password, passwd, secret, apiKey,
#     api_key, token, credentials, auth, accessKey, privateKey, clientSecret).
#     Excludes @Value("${...}"), env.getProperty(), System.getenv() patterns.
#   Rule B: JDBC connection string literals with embedded password query param.
#   Rule C: Annotation-level credentials (@Value("hardcoded"), @Configuration
#     properties with hardcoded String values).
#   Rule D: V5 — String.format() constructing a credential-bearing string assigned
#     to a credential-named variable.
#   Rule E: V2 — aliased credential import: Constants class field with credential
#     name holding a non-empty literal.
#   Rule F: V7 — AI-agent mutation: credential passed as second argument to
#     a constructor or method that implies authentication (BasicAuth, UsernamePassword).
#
# SAFE PATTERNS (excluded by pattern-not):
#   - @Value("${...}") Spring property injection
#   - System.getenv(...)
#   - env.getProperty(...) / environment.getProperty(...)
#   - new SecretKeySpec(Base64.decode(...)) — runtime-decoded, not plaintext
#   - "" or " " — empty/whitespace-only literals (often placeholder defaults)
#
# KNOWN LIMITATIONS:
#   - Encrypted string literals (e.g., ENC(...) patterns from Jasypt) may trigger;
#     a pattern-not guard for "ENC(" prefix is included but may miss variants.
#   - Private constants in separate files require inter-class analysis (Path B).
rules:
  # ── Rule A: String literal assigned to credential-named variable ──────────────
  - id: JV-005-hardcoded-credentials-variable-assignment
    message: |
      A non-empty String literal is assigned to a variable whose name strongly
      suggests it holds a credential (password, secret, apiKey, token, etc.).
      Hardcoded credentials are committed to source control and visible to anyone
      with repository access; they cannot be rotated without a code change.
      Fix: load credentials from environment variables (System.getenv()),
      Spring @Value("${property}"), or a secrets manager (AWS Secrets Manager,
      HashiCorp Vault, GCP Secret Manager).
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      category: hardcoded-credentials
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-either:
          # Local variable assignment
          - pattern: String $CRED = "$VALUE";
          # Instance/static field declaration with initializer
          - pattern: |
              class $CLS {
                ...
                String $CRED = "$VALUE";
                ...
              }
          # Static final field (constants)
          - pattern: |
              class $CLS {
                ...
                static final String $CRED = "$VALUE";
                ...
              }
          # V9 — method parameter default in annotation (Spring @Value with literal)
          - pattern: |
              @Value("$VALUE")
              String $CRED;
      - metavariable-regex:
          metavariable: $CRED
          regex: "(?i).*(password|passwd|secret|apikey|api_key|token|credential|auth_key|authkey|accesskey|access_key|privatekey|private_key|clientsecret|client_secret|dbpass|db_pass).*"
      - metavariable-regex:
          metavariable: $VALUE
          # Must be non-empty and not a Spring EL reference or placeholder
          regex: "^(?!\\$\\{)(?!\\s*$)(?!ENC\\().{1,}"
      # Exclude safe retrieval patterns
      - pattern-not: String $CRED = System.getenv($ENV);
      - pattern-not: String $CRED = $ENV.getProperty($KEY);
      - pattern-not: String $CRED = $ENV.getRequiredProperty($KEY);
      - pattern-not: |
          @Value("${$PROP}")
          String $CRED;
  # ── Rule B: JDBC URL with embedded password ───────────────────────────────────
  - id: JV-005-hardcoded-credentials-jdbc-url
    message: |
      A JDBC connection URL literal contains an embedded password query parameter
      (password=...). Embedding credentials in JDBC URLs exposes them in logs,
      stack traces, and any diagnostic output that prints the connection string.
      Fix: use a DataSource configured via @Value("${spring.datasource.password}")
      or a Spring Boot application.properties reference resolved at runtime from
      a secrets manager.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      category: hardcoded-credentials
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-either:
          - pattern: String $URL = "$JDBC_URL";
          - pattern: $CONN = DriverManager.getConnection("$JDBC_URL", ...);
          - pattern: $DS.setUrl("$JDBC_URL");
          - pattern: $DS.setJdbcUrl("$JDBC_URL");
      - metavariable-regex:
          metavariable: $JDBC_URL
          regex: "(?i)jdbc:.*password=[^&]{1,}"
  # ── Rule C: DriverManager.getConnection() with literal password argument ───────
  - id: JV-005-hardcoded-credentials-driver-manager
    message: |
      DriverManager.getConnection() is called with a literal String as the
      password argument. Hardcoding database passwords in source code exposes
      them to anyone with repository access and makes rotation require a
      redeployment.
      Fix: retrieve the password from System.getenv(), Spring @Value, or a
      dedicated secrets manager and pass it as a variable.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      category: hardcoded-credentials
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern: DriverManager.getConnection($URL, $USER, "$PASS")
      - metavariable-regex:
          metavariable: $PASS
          regex: "^(?!\\s*$).{1,}"
  # ── Rule D: V5 — String.format() constructing credential string ───────────────
  - id: JV-005-hardcoded-credentials-string-format
    message: |
      A credential-named variable is assigned a String built by String.format()
      where one argument is a non-empty literal. If the literal is the credential
      value itself (e.g., format("Bearer %s", "sk-abc123")), this is equivalent
      to hardcoding.
      Fix: build credential strings only from values retrieved at runtime from
      environment variables or a secrets manager.
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      category: hardcoded-credentials
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    patterns:
      - pattern: String $CRED = String.format($FMT, "$LITERAL", ...);
      - metavariable-regex:
          metavariable: $CRED
          regex: "(?i).*(password|passwd|secret|apikey|api_key|token|credential|auth|accesskey|privatekey|clientsecret).*"
      - metavariable-regex:
          metavariable: $LITERAL
          regex: "^(?!\\s*$).{3,}"
  # ── Rule E: V2 — Constants class field with credential name + literal value ────
  - id: JV-005-hardcoded-credentials-constants-class
    message: |
      A class whose name contains "Constant", "Config", "Properties", or "Key"
      declares a public/package-private static String field with a credential-
      suggestive name initialized to a non-empty literal. AI coding agents
      frequently create a Constants class to "centralize" hardcoded credentials.
      Fix: replace the literal with a runtime reference resolved from environment
      variables or a secrets manager; never store credentials as code constants.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      category: hardcoded-credentials
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-inside: |
          class $CLS { ... }
      - metavariable-regex:
          metavariable: $CLS
          regex: "(?i).*(Constant|Config|Properties|Key|Secret|Credential).*"
      - pattern: public static final String $FIELD = "$VALUE";
      - metavariable-regex:
          metavariable: $FIELD
          regex: "(?i).*(password|passwd|secret|apikey|api_key|token|credential|auth|accesskey|privatekey|clientsecret).*"
      - metavariable-regex:
          metavariable: $VALUE
          regex: "^(?!\\s*$)(?!ENC\\().{1,}"
  # ── Rule F: V7 — BasicAuth / UsernamePassword constructor with literal ─────────
  - id: JV-005-hardcoded-credentials-basic-auth-constructor
    message: |
      A constructor or method associated with HTTP Basic Auth or username/password
      authentication (BasicAuth, UsernamePassword, Credentials, setPassword,
      setSecret, withApiKey) is called with a non-empty String literal as the
      password/secret argument. This embeds credentials in source code.
      Fix: retrieve credentials at runtime from environment variables or a
      secrets manager and pass them as variables.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      category: hardcoded-credentials
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-either:
          # BasicAuth / HTTP auth helpers
          - pattern: new UsernamePasswordCredentials($USER, "$PASS")
          - pattern: new BasicAuth($USER, "$PASS")
          - pattern: $OBJ.setPassword("$PASS")
          - pattern: $OBJ.setSecret("$SECRET")
          - pattern: $OBJ.withApiKey("$KEY")
          - pattern: $OBJ.apiKey("$KEY")
          - pattern: $OBJ.setBearerToken("$TOKEN")
          - pattern: $OBJ.withToken("$TOKEN")
          # Spring Security in-memory auth with literal password
          - pattern: $AUTH.withUser($USER).password("$PASS")
          - pattern: $AUTH.inMemoryAuthentication().withUser($USER).password("$PASS")
      - metavariable-regex:
          metavariable: $PASS
          regex: "^(?!\\s*$)(?!\\{noop\\}\\s*$).{1,}"
      - metavariable-regex:
          metavariable: $SECRET
          regex: "^(?!\\s*$).{1,}"
      - metavariable-regex:
          metavariable: $KEY
          regex: "^(?!\\s*$).{3,}"
      - metavariable-regex:
          metavariable: $TOKEN
          regex: "^(?!\\s*$).{3,}"
