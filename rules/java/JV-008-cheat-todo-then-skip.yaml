# Variants covered: V1 V2 V4 V6 V7 V9
# Variants NOT covered:
#   V3 (dynamic attribute access on placeholder-returning method — Path B semantic)
#   V5 (string-constructed method name via reflection — Approach 2 Joern)
#   V8 (reflection reaching the placeholder body — Approach 2 Joern taint)
#
# Detection strategy:
#   Rule A: TODO/FIXME/HACK/XXX comment in a method whose name or annotation
#     indicates a security function, combined with a bare `return null`,
#     `return true`, `return new ArrayList<>()`, or
#     `throw new UnsupportedOperationException()` in the method body.
#   Rule B: V7 — AI-agent mutation — "// TODO" comment immediately above a
#     no-op block (`{}` or single statement) in any method annotated with
#     @PreAuthorize, @Secured, or @RolesAllowed.
#   Rule C: V6 — TODO comment above a bare `return false` in an auth method
#     that should deny access but returns false without checking (the denial
#     is itself a placeholder for the real check).
#   Rule D: V9 — TODO comment in a @RequestMapping-annotated controller method
#     that returns null or throws UnsupportedOperationException — unimplemented
#     API endpoint shipped to production.
#   Rule E: V4 — TODO above UnsupportedOperationException in security interface
#     implementation (transitively skips the whole operation).
#
# IMPORTANT NOTE on comment detection:
#   OpenGrep's Java parser exposes comments as `comment` AST nodes.
#   The `pattern-regex` operator is used to match the comment text.
#   If comment nodes are not indexed by the parser version in use, pair this
#   rule with the ast-grep AG-005 complement rule (future addition).
#
# KNOWN LIMITATIONS:
#   - Proximity detection ("within 3 lines") is approximated by placing the
#     comment pattern and return pattern inside the same method body. True
#     line-proximity requires the `pattern-regex` + `pattern-inside` combination;
#     if comments are not indexed, this rule fires on any TODO in the method body
#     regardless of position relative to the return.
#   - `return new ArrayList<>()` is less common in auth methods but AI agents
#     use it in collection-returning security methods (e.g., getPermissions()).

rules:
  # ── Rule A: TODO/FIXME in security method + placeholder return/throw ───────────
  - id: JV-008-cheat-todo-skip-security-method
    message: |
      A TODO, FIXME, HACK, or XXX comment appears inside a method whose name or
      annotation indicates a security function, accompanied by a placeholder return
      value (null, true, empty list) or UnsupportedOperationException. This is the
      canonical AI-agent "ship-it" bypass: acknowledge the missing implementation
      with a comment but return a permissive or stub value anyway.
      Fix: implement the security check fully before merging; use a temporary
      BLOCK/DENY return (throw AccessDeniedException) rather than a permissive
      one if the feature is not yet ready.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-20: Improper Input Validation"
      owasp: "A01:2021 - Broken Access Control"
      category: ai-cheat-todo-skip
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-inside: |
          $RT $METHOD(...) { ... }
      - metavariable-regex:
          metavariable: $METHOD
          regex: "(?i).*(auth|Auth|validate|Validate|verify|Verify|check|Check|permission|Permission|token|Token|secure|Secure|admin|Admin|login|Login|access|Access|role|Role|guard|Guard|authorize|Authorize).*"
      - pattern-regex: "//\\s*(TODO|FIXME|HACK|XXX):?\\s+"
      - pattern-either:
          - pattern: return null;
          - pattern: return true;
          - pattern: return false;
          - pattern: return new ArrayList<>();
          - pattern: return new ArrayList<$T>();
          - pattern: return Collections.emptyList();
          - pattern: throw new UnsupportedOperationException(...);
          - pattern: throw new UnsupportedOperationException();

  # ── Rule B: V7 — TODO above no-op body in @PreAuthorize / @Secured method ─────
  - id: JV-008-cheat-todo-skip-security-annotation
    message: |
      A TODO, FIXME, or HACK comment appears inside a method annotated with a
      Spring Security access control annotation (@PreAuthorize, @Secured,
      @RolesAllowed), and the method body contains a placeholder return or throw.
      The annotation implies this method is on a security boundary; a TODO comment
      combined with a stub return signals the boundary is not actually enforced.
      Fix: implement the authorization logic before deploying; do not use
      permissive placeholder returns on annotated security methods.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-20: Improper Input Validation"
      owasp: "A01:2021 - Broken Access Control"
      category: ai-cheat-todo-skip
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-either:
          - pattern-inside: |
              @PreAuthorize($EXPR)
              $RT $METHOD(...) { ... }
          - pattern-inside: |
              @Secured($ROLES)
              $RT $METHOD(...) { ... }
          - pattern-inside: |
              @RolesAllowed($ROLES)
              $RT $METHOD(...) { ... }
      - pattern-regex: "//\\s*(TODO|FIXME|HACK|XXX):?\\s+"
      - pattern-either:
          - pattern: return null;
          - pattern: return true;
          - pattern: throw new UnsupportedOperationException(...);
          - pattern: throw new UnsupportedOperationException();

  # ── Rule C: V6 — TODO above return false in auth method (placeholder denial) ───
  - id: JV-008-cheat-todo-skip-false-return-auth
    message: |
      A TODO, FIXME, or HACK comment appears inside an auth-named method above a
      bare 'return false'. While false is the safe default for authorization, in
      this context the comment signals the check is not actually implemented —
      the false return is a placeholder, not a deliberate denial based on real state.
      The method will change behavior when the TODO is "fixed", potentially
      introducing a bypass at that point.
      Fix: implement the real check now; if the method must temporarily deny,
      throw an explicit AccessDeniedException with a descriptive message rather
      than returning false silently.
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-20: Improper Input Validation"
      owasp: "A01:2021 - Broken Access Control"
      category: ai-cheat-todo-skip
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    patterns:
      - pattern-inside: |
          $RT $METHOD(...) { ... }
      - metavariable-regex:
          metavariable: $METHOD
          regex: "(?i).*(auth|Auth|validate|Validate|verify|Verify|check|Check|permission|Permission|token|Token|login|Login|access|Access|role|Role|authorize|Authorize).*"
      - pattern-regex: "//\\s*(TODO|FIXME|HACK|XXX):?\\s+"
      - pattern: return false;

  # ── Rule D: V9 — TODO in @RequestMapping controller returning null / UOE ───────
  - id: JV-008-cheat-todo-skip-unimplemented-endpoint
    message: |
      A Spring MVC controller method (annotated @GetMapping, @PostMapping,
      @PutMapping, @DeleteMapping, or @RequestMapping) contains a TODO/FIXME
      comment and returns null or throws UnsupportedOperationException. This
      ships an unimplemented endpoint to production that may bypass expected
      access control or input validation logic that hasn't been written yet.
      Fix: implement the endpoint fully before deploying; use a 501 Not Implemented
      response explicitly if the feature is intentionally pending.
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-20: Improper Input Validation"
      owasp: "A05:2021 - Security Misconfiguration"
      category: ai-cheat-todo-skip
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    patterns:
      - pattern-either:
          - pattern-inside: |
              @GetMapping(...)
              $RT $METHOD(...) { ... }
          - pattern-inside: |
              @PostMapping(...)
              $RT $METHOD(...) { ... }
          - pattern-inside: |
              @PutMapping(...)
              $RT $METHOD(...) { ... }
          - pattern-inside: |
              @DeleteMapping(...)
              $RT $METHOD(...) { ... }
          - pattern-inside: |
              @RequestMapping(...)
              $RT $METHOD(...) { ... }
      - pattern-regex: "//\\s*(TODO|FIXME|HACK|XXX):?\\s+"
      - pattern-either:
          - pattern: return null;
          - pattern: throw new UnsupportedOperationException(...);
          - pattern: throw new UnsupportedOperationException();

  # ── Rule E: V4 — TODO above UOE in security interface implementation ───────────
  - id: JV-008-cheat-todo-skip-interface-impl
    message: |
      A TODO, FIXME, or HACK comment precedes a throw new
      UnsupportedOperationException() inside a class that implements a security-
      relevant interface (UserDetailsService, AuthenticationProvider,
      AccessDecisionManager, PermissionEvaluator). Stub implementations of
      security interfaces bypass the entire security subsystem for the affected
      method.
      Fix: implement all required security interface methods fully before
      deploying; never ship UnsupportedOperationException as a security method body.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-20: Improper Input Validation"
      owasp: "A07:2021 - Identification and Authentication Failures"
      category: ai-cheat-todo-skip
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-either:
          - pattern-inside: |
              class $CLS implements UserDetailsService { ... }
          - pattern-inside: |
              class $CLS implements AuthenticationProvider { ... }
          - pattern-inside: |
              class $CLS implements AccessDecisionManager { ... }
          - pattern-inside: |
              class $CLS implements PermissionEvaluator { ... }
          - pattern-inside: |
              class $CLS implements UserDetailsPasswordService { ... }
      - pattern-regex: "//\\s*(TODO|FIXME|HACK|XXX):?\\s+"
      - pattern-either:
          - pattern: throw new UnsupportedOperationException(...);
          - pattern: throw new UnsupportedOperationException();
          - pattern: return null;
