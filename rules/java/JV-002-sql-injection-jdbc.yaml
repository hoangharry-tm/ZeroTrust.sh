# Variants covered: V1 V2 V4 V5 V7 V8 V9
# Variants NOT covered:
#   V3 (dynamic attribute lookup on Statement subtype — too broad without taint mode)
#   V6 (conditional bypass: query built in one branch then passed — Path B semantic)
#
# Detection strategy:
#   Rule A (taint): user-controlled sources (Spring annotations, HttpServletRequest)
#     → Statement.execute/executeQuery/executeUpdate sinks.
#   Rule B (inline concat): String concatenation / String.format() directly inside
#     the execute*() call — catches the most common AI-generated pattern.
#   Rule C (variable concat): SQL built via += or StringBuilder in a visible scope
#     before being passed to execute*().
#   Rule D (V8 reflection): Method.invoke() reaching a Statement execute* method.
#   Rule E (negative: PreparedStatement): used only internally as pattern-not guards;
#     rules explicitly exclude PreparedStatement, @Query with named params, and
#     JpaRepository to avoid FPs on safe patterns.
#
# KNOWN LIMITATIONS:
#   - Multi-step taint via DTO fields or service method boundaries requires
#     inter-procedural analysis in Path B Joern.
#   - JPA Criteria API (CriteriaBuilder) is safe by construction and excluded.

rules:
  # ── Rule A: taint mode — Spring sources → JDBC execute* sinks ────────────────
  - id: JV-002-sql-injection-jdbc-taint
    message: |
      HTTP request data flows into a JDBC Statement.execute/executeQuery/executeUpdate
      call via String concatenation or String.format(), creating a SQL injection
      vulnerability. An attacker can manipulate the query to read, modify, or
      delete arbitrary database records.
      Fix: replace with a PreparedStatement and parameterized placeholders; never
      build SQL strings by concatenating user-supplied input.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp: "A03:2021 - Injection"
      category: sql-injection
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    mode: taint
    pattern-sources:
      # V9 — Spring MVC request annotation sources
      - pattern: |
          $T $M(@RequestParam $PT $P, ...) { ... }
        focus-metavariable: $P
      - pattern: |
          $T $M(@RequestBody $PT $P, ...) { ... }
        focus-metavariable: $P
      - pattern: |
          $T $M(@PathVariable $PT $P, ...) { ... }
        focus-metavariable: $P
      # V1 — HttpServletRequest accessors
      - pattern: $REQ.getParameter(...)
      - pattern: $REQ.getParameterValues(...)
      - pattern: $REQ.getQueryString()
      - pattern: $REQ.getHeader(...)
    pattern-sinks:
      # V1 direct — Statement.execute*
      - pattern: $STMT.execute($SQL)
        focus-metavariable: $SQL
      - pattern: $STMT.executeQuery($SQL)
        focus-metavariable: $SQL
      - pattern: $STMT.executeUpdate($SQL)
        focus-metavariable: $SQL
      - pattern: $STMT.executeLargeUpdate($SQL)
        focus-metavariable: $SQL
      # V2 — aliased via Connection.createStatement() result
      - pattern: $CONN.createStatement().execute($SQL)
        focus-metavariable: $SQL
      - pattern: $CONN.createStatement().executeQuery($SQL)
        focus-metavariable: $SQL
      - pattern: $CONN.createStatement().executeUpdate($SQL)
        focus-metavariable: $SQL
    pattern-sanitizers:
      # Safe patterns: PreparedStatement parameter binding
      - pattern: $CONN.prepareStatement($SQL)
      - pattern: $STMT.setString(...)
      - pattern: $STMT.setInt(...)
      - pattern: $STMT.setLong(...)
      - pattern: $STMT.setObject(...)

  # ── Rule B: inline String concat / String.format() in execute*() call ─────────
  - id: JV-002-sql-injection-jdbc-inline-concat
    message: |
      A String concatenation expression or String.format() call is passed directly
      as the SQL argument to Statement.execute/executeQuery/executeUpdate. If any
      operand derives from user input, this is a SQL injection vulnerability.
      Fix: use PreparedStatement with '?' placeholders and setXxx() binding instead.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp: "A03:2021 - Injection"
      category: sql-injection
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-either:
          # V1/V5 — String concat directly in execute*()
          - pattern: $STMT.execute($A + $B)
          - pattern: $STMT.executeQuery($A + $B)
          - pattern: $STMT.executeUpdate($A + $B)
          - pattern: $STMT.executeLargeUpdate($A + $B)
          # V5 — String.format() directly in execute*()
          - pattern: $STMT.execute(String.format($FMT, $ARGS))
          - pattern: $STMT.executeQuery(String.format($FMT, $ARGS))
          - pattern: $STMT.executeUpdate(String.format($FMT, $ARGS))
          - pattern: $STMT.executeLargeUpdate(String.format($FMT, $ARGS))
          # V5 — formatted() (Java 15+) directly in execute*()
          - pattern: $STMT.execute($FMT.formatted($ARGS))
          - pattern: $STMT.executeQuery($FMT.formatted($ARGS))
          - pattern: $STMT.executeUpdate($FMT.formatted($ARGS))
      # Exclude PreparedStatement — those use parameterized binding
      - pattern-not: $PSTMT.execute($A + $B)
      - pattern-not-inside: |
          PreparedStatement $PSTMT = ...;
          ...

  # ── Rule C: V4 — SQL built via StringBuilder / += then passed to execute*() ───
  - id: JV-002-sql-injection-jdbc-stringbuilder
    message: |
      A SQL string is assembled using StringBuilder.append() or string concatenation
      (+=) in a visible scope and then passed to Statement.execute/executeQuery/
      executeUpdate. If any appended value originates from user input, this allows
      SQL injection.
      Fix: replace the Statement with a PreparedStatement and bind each user-supplied
      value with a parameterized placeholder.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp: "A03:2021 - Injection"
      category: sql-injection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    patterns:
      - pattern-either:
          # V4 — StringBuilder.append() chain then execute*
          - pattern: |
              StringBuilder $SB = new StringBuilder(...);
              ...
              $SB.append($VAR);
              ...
              $STMT.executeQuery($SB.toString());
          - pattern: |
              StringBuilder $SB = new StringBuilder(...);
              ...
              $SB.append($VAR);
              ...
              $STMT.execute($SB.toString());
          - pattern: |
              StringBuilder $SB = new StringBuilder(...);
              ...
              $SB.append($VAR);
              ...
              $STMT.executeUpdate($SB.toString());
          # V4 — += concatenation then execute*
          - pattern: |
              String $SQL = $BASE;
              ...
              $SQL += $VAR;
              ...
              $STMT.executeQuery($SQL);
          - pattern: |
              String $SQL = $BASE;
              ...
              $SQL += $VAR;
              ...
              $STMT.execute($SQL);
          - pattern: |
              String $SQL = $BASE;
              ...
              $SQL += $VAR;
              ...
              $STMT.executeUpdate($SQL);

  # ── Rule D: V8 — Reflection (Method.invoke()) reaching Statement execute* ──────
  - id: JV-002-sql-injection-jdbc-reflection
    message: |
      A Method.invoke() call whose target class name contains "Statement" passes
      a String argument that may be SQL. If the String was built from user input,
      the reflective invocation bypasses normal static analysis and still executes
      the injection.
      Fix: eliminate reflective invocation of JDBC execute methods; use
      PreparedStatement with parameterized queries.
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp: "A03:2021 - Injection"
      category: sql-injection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    patterns:
      - pattern: $M.invoke($STMT, $SQL, ...)
      - pattern-inside: |
          Method $M = $CLS.getMethod($MNAME, ...);
          ...
      - pattern-either:
          - pattern: $M.invoke($STMT, $A + $B, ...)
          - pattern: $M.invoke($STMT, String.format($FMT, ...), ...)
