# Variants covered: V1 V2
# Variants NOT covered:
#   V3 (conditional via ternary — requires path sensitivity; Path B)
#
# Detection strategy:
#   Rule A (auth-function): System.getenv("TEST"/"DEV"/"DEBUG") == "true"
#     returning true/null in security-annotated methods.
#   Rule B (direct): bare env check before auth call in any method.
#
# Attack scenario:
#   AI agents commonly add `if ("true".equals(System.getenv("TEST"))) return true;`
#   to security methods so automated tests pass. In production, this creates
#   an authentication bypass that is invisible in normal code review.
rules:
  # ── Rule A: env bypass in security methods ────────────────────────────────────
  - id: JV-010-test-env-bypass-auth-method
    message: |
      Test environment variable check in a security-related method.
      `System.getenv("TEST"/"DEV"/"DEBUG")` returning true/null in a method named
      `*auth*`, `*validate*`, `*check*`, `*verify*`, `*admin*`, or annotated with
      `@PreAuthorize`/`@Secured` suggests an AI agent test bypass.
      Fix: remove the environment variable bypass from security controls.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-306: Missing Authentication for Critical Function"
      owasp: "A01:2021 - Broken Access Control"
      category: cheat-detection
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-inside: |
          $RET $FUNC(...) {
            ...
          }
      - metavariable-pattern:
          metavariable: $FUNC
          patterns:
            - pattern-regex: (?i).*(auth|validate|check|verify|admin|permission|login).*
      - pattern-either:
          - patterns:
              - pattern: |
                  if ("true".equals(System.getenv($VAR))) {
                      return $VAL;
                  }
              - metavariable-pattern:
                  metavariable: $VAR
                  patterns:
                    - pattern-regex: (?i)(TEST|DEV|DEBUG|CI|STAGING|LOCAL|BYPASS)
          - patterns:
              - pattern: |
                  if (System.getenv($VAR) != null && System.getenv($VAR).equals("true")) {
                      return $VAL;
                  }
              - metavariable-pattern:
                  metavariable: $VAR
                  patterns:
                    - pattern-regex: (?i)(TEST|DEV|DEBUG|CI|STAGING|LOCAL|BYPASS)

  # ── Rule B: env bypass in @PreAuthorize / @Secured methods ────────────────────
  - id: JV-010-test-env-bypass-annotation
    message: |
      Test environment variable check in a method with a security annotation.
      Environment-based bypasses in `@PreAuthorize` or `@Secured` annotated methods
      are a common AI agent shortcut that creates production vulnerabilities.
      Fix: remove the bypass; use Spring @Profile for environment-specific config.
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-306: Missing Authentication for Critical Function"
      owasp: "A01:2021 - Broken Access Control"
      category: cheat-detection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    patterns:
      - pattern-inside: |
          @$ANN(...)
          $RET $FUNC(...) {
            ...
          }
      - metavariable-pattern:
          metavariable: $ANN
          patterns:
            - pattern-regex: (?i).*(PreAuthorize|Secured|RolesAllowed).*
      - pattern-either:
          - pattern: |
              if ("true".equals(System.getenv($VAR))) {
                  return true;
          - pattern: |
              if ("true".equals(System.getenv($VAR))) {
                  return null;
