# Variants covered: V1 V2 V4 V5 V7 V9
# Variants NOT covered:
#   V3 (dynamic method dispatch on LLM client object — too broad, high FP risk)
#   V6 (conditional prompt-building bypass — requires Path B semantic depth)
#   V8 (reflection reaching LLM sink — deferred to Approach 2 Joern taint)
#
# Detection strategy:
#   Rule A (taint): traces Spring MVC request-annotation parameters
#     (@RequestParam, @RequestBody, @PathVariable) and HttpServletRequest
#     accessor calls as taint sources → any LLM SDK sink (spring-ai, LangChain4J,
#     openai4j, Anthropic Java SDK, or method names matching generate/chat/
#     complete/prompt/ask/infer).
#   Rule B (inline concat): catches String concatenation and String.format()
#     directly inside LLM call arguments where a tainted-named variable is visible.
#   Rule C (aliased client): catches aliased LLM client objects whose method
#     name matches the LLM sink set, invoked with a non-constant string argument.
#   Rule D (V9 annotation-as-source): catches the @RequestParam-annotated
#     method parameter flowing directly into an LLM call within the same method
#     body without any intermediate sanitization.
#
# KNOWN LIMITATIONS:
#   - Multi-hop taint via DTO fields (e.g., body.getContent()) requires
#     inter-procedural analysis in Path B.
#   - Reactive (Flux/Mono) chains are not matched by these patterns.
rules:
  # ── Rule A: taint mode — Spring MVC sources → LLM SDK sinks ─────────────────
  - id: JV-001-spring-boot-prompt-injection-taint
    message: |
      Unsanitized HTTP request data (Spring MVC parameter or HttpServletRequest
      accessor) flows directly into an LLM API call. An attacker can inject
      adversarial instructions that override the system prompt or exfiltrate
      conversation context via the model response.
      Fix: validate and sanitize all user-supplied content before including it
      in prompt messages; enforce a strict structural separation between user
      data and prompt instructions.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command"
      owasp: "A03:2021 - Injection"
      category: llm-prompt-injection
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    mode: taint
    pattern-sources:
      # V9 — @RequestParam-annotated method parameter
      - pattern: |
          $TYPE $METHOD(@RequestParam $PTYPE $PARAM, ...) { ... }
        focus-metavariable: $PARAM
      # V9 — @RequestBody-annotated method parameter
      - pattern: |
          $TYPE $METHOD(@RequestBody $PTYPE $PARAM, ...) { ... }
        focus-metavariable: $PARAM
      # V9 — @PathVariable-annotated method parameter
      - pattern: |
          $TYPE $METHOD(@PathVariable $PTYPE $PARAM, ...) { ... }
        focus-metavariable: $PARAM
      # V9 — @RequestHeader-annotated method parameter
      - pattern: |
          $TYPE $METHOD(@RequestHeader $HTYPE $PARAM, ...) { ... }
        focus-metavariable: $PARAM
      # V1 — HttpServletRequest.getParameter()
      - pattern: $REQ.getParameter(...)
      # V1 — HttpServletRequest.getParameterValues()
      - pattern: $REQ.getParameterValues(...)
      # V1 — HttpServletRequest.getQueryString()
      - pattern: $REQ.getQueryString()
      # V1 — HttpServletRequest.getHeader()
      - pattern: $REQ.getHeader(...)
      # V1 — HttpServletRequest.getReader() / getInputStream()
      - pattern: $REQ.getReader()
      - pattern: $REQ.getInputStream()
    pattern-sinks:
      # spring-ai ChatClient (Approach 2+ common usage)
      - pattern: $CLIENT.call($PROMPT)
        focus-metavariable: $PROMPT
      - pattern: $CLIENT.prompt($PROMPT)
        focus-metavariable: $PROMPT
      - pattern: $CLIENT.prompt().user($MSG)
        focus-metavariable: $MSG
      - pattern: $CLIENT.prompt().system($MSG)
        focus-metavariable: $MSG
      # spring-ai ChatModel / ChatLanguageModel
      - pattern: $MODEL.call($MSG)
        focus-metavariable: $MSG
      - pattern: $MODEL.generate($MSG)
        focus-metavariable: $MSG
      # LangChain4J — ChatLanguageModel.generate()
      - pattern: $LM.generate($MSGS)
        focus-metavariable: $MSGS
      - pattern: $LM.chat($MSGS)
        focus-metavariable: $MSGS
      # openai4j — ChatCompletion
      - pattern: $OAI.createChatCompletion($REQ2)
        focus-metavariable: $REQ2
      - pattern: $OAI.complete($PROMPT)
        focus-metavariable: $PROMPT
      # Anthropic Java SDK
      - pattern: $ANT.messages().create($PARAMS)
        focus-metavariable: $PARAMS
      # Generic LLM sink — method name matches known LLM verbs (V7 mutations)
      - pattern: $OBJ.generate($ARG)
        focus-metavariable: $ARG
      - pattern: $OBJ.complete($ARG)
        focus-metavariable: $ARG
      - pattern: $OBJ.prompt($ARG)
        focus-metavariable: $ARG
      - pattern: $OBJ.ask($ARG)
        focus-metavariable: $ARG
      - pattern: $OBJ.infer($ARG)
        focus-metavariable: $ARG
    pattern-sanitizers:
      # User data in UserMessage/user role is correct — injection requires it in SystemMessage/system role
      - pattern: new UserMessage($TAINTED)
      - pattern: new ChatMessage("user", $TAINTED)
      - pattern: new Message("user", $TAINTED)
      - pattern: builder.user($TAINTED)
      - pattern: $CLIENT.prompt().user($TAINTED)
  # ── Rule B: inline String concatenation / String.format() in LLM call args ───
  - id: JV-001-spring-boot-prompt-injection-concat
    message: |
      A String concatenation or String.format() call whose operands include a
      variable with a request-origin name is passed directly to an LLM API call.
      If the variable originates from HTTP request data, an attacker can inject
      adversarial instructions into the model prompt.
      Fix: never construct prompts by concatenating raw user data; pass user
      content only as a clearly-labelled, structurally-separated user message.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command"
      owasp: "A03:2021 - Injection"
      category: llm-prompt-injection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    patterns:
      - pattern-either:
          # V5 — String.format() with variable argument flowing into LLM generate
          - pattern: $OBJ.generate(String.format($TMPL, $VAR, ...))
          - pattern: $OBJ.complete(String.format($TMPL, $VAR, ...))
          - pattern: $OBJ.prompt(String.format($TMPL, $VAR, ...))
          - pattern: $OBJ.call(String.format($TMPL, $VAR, ...))
          - pattern: $OBJ.ask(String.format($TMPL, $VAR, ...))
          - pattern: $OBJ.infer(String.format($TMPL, $VAR, ...))
          # V5 — String.format() into spring-ai prompt().user()
          - pattern: $CLIENT.prompt().user(String.format($TMPL, $VAR, ...))
          - pattern: $CLIENT.prompt().system(String.format($TMPL, $VAR, ...))
          # V4 — transitive: variable built by concat then passed
          - pattern: |
              $PROMPT = $PREFIX + $VAR + $SUFFIX;
              ...
              $OBJ.generate($PROMPT);
          - pattern: |
              $PROMPT = $PREFIX + $VAR + $SUFFIX;
              ...
              $OBJ.complete($PROMPT);
          - pattern: |
              $PROMPT = $PREFIX + $VAR;
              ...
              $OBJ.prompt($PROMPT);
          - pattern: |
              $PROMPT = $PREFIX + $VAR;
              ...
              $OBJ.call($PROMPT);
  # ── Rule C: V2 — aliased LLM client usage ────────────────────────────────────
  - id: JV-001-spring-boot-prompt-injection-aliased-client
    message: |
      An aliased LLM client object calls a method associated with model inference
      (generate, chat, complete, prompt, ask, infer) with a non-constant String
      argument inside a Spring MVC controller method. If the argument derives
      from an HTTP request, prompt injection is possible.
      Fix: sanitize or structurally separate all user-supplied content before
      passing it to the LLM client.
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command"
      owasp: "A03:2021 - Injection"
      category: llm-prompt-injection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    patterns:
      - pattern-inside: |
          @RestController
          class $CTRL { ... }
      - pattern-either:
          - pattern: $CLIENT.generate($ARG)
          - pattern: $CLIENT.chat($ARG)
          - pattern: $CLIENT.complete($ARG)
          - pattern: $CLIENT.ask($ARG)
          - pattern: $CLIENT.infer($ARG)
      - pattern-not: $CLIENT.generate("...")
      - pattern-not: $CLIENT.chat("...")
      - pattern-not: $CLIENT.complete("...")
      - pattern-not: $CLIENT.ask("...")
      - pattern-not: $CLIENT.infer("...")
