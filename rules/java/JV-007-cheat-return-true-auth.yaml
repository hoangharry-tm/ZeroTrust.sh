# Variants covered: V1 V2 V4 V6 V7 V9
# Variants NOT covered:
#   V3 (dynamic dispatch on auth method via interface reference — Approach 2 Joern)
#   V5 (string-constructed method name — reflection; Approach 2)
#   V8 (reflection: Method.invoke() reaching auth method — Approach 2 Joern)
#
# Detection strategy:
#   Rule A: Methods annotated @PreAuthorize or @Secured that contain a bare
#     `return true;` not guarded by a conditional checking a real value.
#   Rule B: Methods whose name matches the auth/permission/role/validate keyword
#     set that return `return true;` or `return null;` unconditionally.
#   Rule C: V6 — boolean auth methods that return `return true;` inside a catch
#     block (exception-driven always-allow bypass pattern).
#   Rule D: V7 — AI-agent mutation — annotated auth methods that return
#     Boolean.TRUE or 1 (common Java agent shortcuts).
#   Rule E: V9 — Spring Security UserDetailsService.loadUserByUsername() that
#     returns a hardcoded UserDetails with granted authority but no actual lookup.
#   Rule F (V4): auth method that delegates to a helper returning true in all
#     paths (transitively always-true).
#
# pattern-not-inside:
#   Test classes — class names containing Test, Spec, Mock, IT, Stub are excluded
#   because mock implementations legitimately return fixed values.
#
# KNOWN LIMITATIONS:
#   - `return true;` inside a conditional (if (user != null) return true;) is NOT
#     flagged by Rule A/B — those cases require path-sensitivity in Path B.
#   - Boolean permission methods that call a real service and then return true on
#     a non-null result look structurally similar; confidence set to HIGH for
#     annotation-based rules and MEDIUM for name-only rules.
rules:
  # ── Rule A: @PreAuthorize / @Secured method with bare return true ─────────────
  - id: JV-007-cheat-return-true-pre-authorize
    message: |
      A method annotated with @PreAuthorize or @Secured contains a bare 'return
      true' statement. This unconditionally grants authorization regardless of the
      calling user's actual permissions. AI coding agents add this pattern to make
      tests pass or silence Spring Security rejections during development.
      Fix: implement the authorization predicate fully; never return a hardcoded
      true from a method that controls access decisions.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-284: Improper Access Control"
      owasp: "A01:2021 - Broken Access Control"
      category: cheat-return-true-auth
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-not-inside: |
          class $TEST { ... }
        metavariable-regex:
          metavariable: $TEST
          regex: ".*(Test|Spec|Mock|IT|Stub|Fake).*"
      - pattern-either:
          # V1 — @PreAuthorize method returns true unconditionally
          - pattern: |
              @PreAuthorize($EXPR)
              $RT $METHOD(...) {
                return true;
              }
          # V1 — @Secured method returns true unconditionally
          - pattern: |
              @Secured($ROLES)
              $RT $METHOD(...) {
                return true;
              }
          # V1 — @PreAuthorize method returns null unconditionally
          - pattern: |
              @PreAuthorize($EXPR)
              $RT $METHOD(...) {
                return null;
              }
          # V1 — @Secured method returns null unconditionally
          - pattern: |
              @Secured($ROLES)
              $RT $METHOD(...) {
                return null;
              }
          # V7 — AI mutation: Boolean.TRUE instead of literal true
          - pattern: |
              @PreAuthorize($EXPR)
              $RT $METHOD(...) {
                return Boolean.TRUE;
              }
          - pattern: |
              @Secured($ROLES)
              $RT $METHOD(...) {
                return Boolean.TRUE;
              }
  # ── Rule B: auth-named method with bare return true / return null ──────────────
  - id: JV-007-cheat-return-true-auth-method-name
    message: |
      A method whose name indicates an authorization or authentication decision
      (isAuthorized, checkPermission, validateToken, hasRole, canAccess,
      authenticate, isAdmin, isLoggedIn, etc.) unconditionally returns 'true' or
      'null'. This makes every authorization check in the application pass
      regardless of the actual user state.
      Fix: implement the full authorization logic; use a real user/role lookup
      against the authentication principal.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-284: Improper Access Control"
      owasp: "A01:2021 - Broken Access Control"
      category: cheat-return-true-auth
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-not-inside: |
          class $TEST { ... }
        metavariable-regex:
          metavariable: $TEST
          regex: ".*(Test|Spec|Mock|IT|Stub|Fake).*"
      - pattern-either:
          - pattern: |
              $RT $METHOD(...) {
                return true;
              }
          - pattern: |
              $RT $METHOD(...) {
                return null;
              }
          - pattern: |
              $RT $METHOD(...) {
                return Boolean.TRUE;
              }
      - metavariable-regex:
          metavariable: $METHOD
          regex: "(?i).*(isAuthorized|checkPermission|validateToken|hasRole|canAccess|authenticate|isAdmin|isLoggedIn|isAuthenticated|verifyToken|authorizeUser|checkAccess|verifyUser|validateUser|isAllowed|hasPermission|permitUser).*"
  # ── Rule C: V6 — return true inside catch block in auth method ─────────────────
  - id: JV-007-cheat-return-true-in-catch
    message: |
      An auth-named or auth-annotated method returns 'true' inside a catch block,
      granting authorization when an exception occurs. This is an inverted security
      model: failures (authentication errors, token validation exceptions) result
      in access being granted rather than denied.
      Fix: catch blocks in security methods must deny access on exception, not
      grant it; re-throw the exception or return false/null.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-755: Improper Handling of Exceptional Conditions"
      owasp: "A01:2021 - Broken Access Control"
      category: cheat-return-true-auth
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-not-inside: |
          class $TEST { ... }
        metavariable-regex:
          metavariable: $TEST
          regex: ".*(Test|Spec|Mock|IT|Stub|Fake).*"
      - pattern: |
          $RT $METHOD(...) {
            ...
            try { ... } catch ($EX $E) {
              return true;
            }
            ...
          }
      - metavariable-regex:
          metavariable: $METHOD
          regex: "(?i).*(auth|Auth|validate|Validate|verify|Verify|check|Check|permission|Permission|token|Token|login|Login|admin|Admin|access|Access|role|Role).*"
  # ── Rule D: V7 — auth method body is only a single return statement ────────────
  - id: JV-007-cheat-single-statement-auth-method
    message: |
      An auth-annotated method has a single-statement body that is 'return true',
      'return null', or 'return Boolean.TRUE'. A legitimate authorization method
      must query user state, roles, or token validity — a one-liner returning a
      constant is almost always an AI-agent placeholder left in production code.
      Fix: implement the real authorization logic before deploying.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-863: Incorrect Authorization"
      owasp: "A01:2021 - Broken Access Control"
      category: cheat-return-true-auth
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-not-inside: |
          class $TEST { ... }
        metavariable-regex:
          metavariable: $TEST
          regex: ".*(Test|Spec|Mock|IT|Stub|Fake).*"
      - pattern-either:
          - pattern: |
              @RolesAllowed($ROLES)
              $RT $METHOD(...) {
                return true;
              }
          - pattern: |
              @RolesAllowed($ROLES)
              $RT $METHOD(...) {
                return null;
              }
          # V2 — custom @HasPermission meta-annotation
          - pattern: |
              @HasPermission($PERM)
              $RT $METHOD(...) {
                return true;
              }
  # ── Rule E: V9 — UserDetailsService returning constant UserDetails ────────────
  - id: JV-007-cheat-user-details-service-stub
    message: |
      A UserDetailsService.loadUserByUsername() implementation returns a hardcoded
      User object (spring-security User class) with a fixed password literal and
      roles rather than performing an actual user lookup. This allows any username
      to authenticate with the hardcoded credentials.
      Fix: implement a real user lookup against a database or LDAP directory;
      never return a hardcoded User from loadUserByUsername().
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-284: Improper Access Control"
      owasp: "A07:2021 - Identification and Authentication Failures"
      category: cheat-return-true-auth
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-inside: |
          class $CLS implements UserDetailsService {
            ...
          }
      - pattern: |
          public UserDetails loadUserByUsername(String $USERNAME) throws UsernameNotFoundException {
            return new User($USER_LITERAL, "$PASS_LITERAL", $AUTHORITIES);
          }
      - metavariable-regex:
          metavariable: $PASS_LITERAL
          regex: "^(?!\\s*$)(?!\\{bcrypt\\})(?!\\{noop\\}\\s*$).{1,}"
