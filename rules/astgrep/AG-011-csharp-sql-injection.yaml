id: AG-011-csharp-sql-injection
language: csharp
message: >
  A SQL statement built via string concatenation or interpolation is passed to a database execution method. If any segment originates from user input, SQL injection is possible. Fix: use parameterized queries with SqlParameter or Entity Framework's LINQ instead of raw SQL strings.

severity: error
metadata:
  cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
  owasp: "A03:2021 - Injection"
  category: sql-injection
  ai_specific: true
  confidence: HIGH
  rule_version: "1.0"
rule:
  any:
    - pattern: $CMD.ExecuteQuery($SQL)
    - pattern: $CMD.ExecuteNonQuery($SQL)
    - pattern: $CMD.ExecuteReader($SQL)
    - pattern: $CMD.ExecuteScalar($SQL)
    - pattern: $CONTEXT.Database.ExecuteSqlRaw($SQL)
    - pattern: $CONTEXT.Database.ExecuteSqlCommand($SQL)
    - pattern: $CONTEXT.Database.SqlQuery($SQL)
  not:
    any:
      - pattern: $CMD.ExecuteQuery("$STATIC")
      - pattern: $CMD.ExecuteNonQuery("$STATIC")
      - pattern: $CMD.ExecuteReader("$STATIC")
      - pattern: $CMD.ExecuteScalar("$STATIC")
      - pattern: $CONTEXT.Database.ExecuteSqlRaw($SQL, $$$PARAMS)
      - pattern: $CONTEXT.Database.SqlQuery($SQL, $$$PARAMS)
