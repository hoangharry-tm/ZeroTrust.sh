# AI-specific Unique Rule
# Why unique: No existing Python linter checks whether the DEFAULT value in
# `os.getenv(key, default)` looks like a real credential vs a placeholder.
# AI agents frequently generate `os.getenv("API_KEY", "sk-...")` where the
# fallback IS a real credential — "works on my machine" becomes a deployment risk.
#
# Attack scenario:
#   AI agent writes: DB_PASSWORD = os.getenv("DB_PASSWORD", "P@ssw0rd!")
#   The fallback is used when the env var isn't set — which happens in production
#   if the deployment hasn't configured the env var. The real password is embedded
#   in the source code and visible in the repo.
id: AG-022-python-credential-fallback-env
language: python
message: |
  Environment variable lookup with a fallback value that looks like a real
  credential (not a placeholder). AI coding agents commonly add hardcoded
  fallback credentials "for development" that end up deployed to production.
  Fix: remove the fallback value; let the code fail if the env var is missing.
severity: error
metadata:
  cwe: "CWE-798: Use of Hardcoded Credentials"
  owasp: "A07:2021 - Identification and Authentication Failures"
  category: secrets
  ai_specific: true
  confidence: HIGH
  rule_version: "1.0"
rule:
  any:
    # os.getenv with credential-like fallback
    - pattern: os.getenv($KEY, sk-$VAL)
    - pattern: os.getenv($KEY, $VAL)
    - pattern: os.environ.get($KEY, $VAL)
    - pattern: os.environ[$KEY]
