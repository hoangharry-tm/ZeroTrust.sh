# AI-specific Unique Rule
# Why unique: Detekt has `UnsafeCastRule` but doesn't specifically flag
# `!!` on values returned from authentication, database, or security
# operations. AI agents excessively use `!!` as a quick-fix for nullable
# type mismatches, introducing null-pointer crash risks in security paths.
#
# Attack scenario:
#   AI agent writes `val user = db.findUser(id)!!` — if the user isn't
#   found, this throws NPE instead of returning null/optional, crashing
#   the auth flow with no fallback handling.
id: AG-019-kotlin-not-null-assertion
language: kotlin
message: |
  Non-null assertion operator `!!` used in a security-related context.
  AI coding agents frequently add `!!` as a quick fix for nullable type
  mismatches, but it introduces a null-pointer crash risk if the value
  is null.
  Fix: use safe calls (`?.`) or the Elvis operator (`?:`) with proper
  error handling instead of `!!`.
severity: warning
metadata:
  cwe: "CWE-476: NULL Pointer Dereference"
  owasp: "A04:2021 - Insecure Design"
  category: cheat-detection
  ai_specific: true
  confidence: MEDIUM
  rule_version: "1.0"
rule:
  pattern: $EXPR!!
