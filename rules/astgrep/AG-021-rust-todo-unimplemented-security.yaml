# AI-specific Unique Rule
# Why unique: Clippy warns about `unwrap_used` and `panic` but doesn't specifically
# flag `todo!()` or `unimplemented!()` in security-critical functions. AI agents
# frequently leave `todo!()` markers in auth/crypto logic as placeholders —
# "implement this later" — that get deployed.
#
# Attack scenario:
#   An AI agent generates an authentication handler with `todo!()` for the actual
#   token verification. The code compiles, passes CI (tests don't hit that path),
#   and is deployed. The first authentication request panics the server — or worse,
#   if recovered, grants access unconditionally.
id: AG-021-rust-todo-unimplemented-security
language: rust
message: |
  todo!() or unimplemented!() found in a function related to authentication,
  authorization, encryption, or data validation. AI coding agents commonly
  leave these placeholders with the intent to "implement later" — but they
  are frequently deployed as-is.
  Fix: implement the security logic before deploying, or use a proper
  error-returning stub that fails closed.
severity: error
metadata:
  cwe: "CWE-1061: Insufficient Encapsulation"
  owasp: "A04:2021 - Insecure Design"
  category: cheat-detection
  ai_specific: true
  confidence: HIGH
  rule_version: "1.0"
rule:
  any:
    - pattern: todo!()
    - pattern: unimplemented!()
