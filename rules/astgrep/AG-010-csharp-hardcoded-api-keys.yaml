id: AG-010-csharp-hardcoded-api-keys
language: csharp
message: >
  A string literal matching an API key pattern is assigned to a variable with a
  credential-suggestive name. Hardcoded keys in C# are compiled into the assembly
  and extractable via ILSpy or dotPeek.
  Fix: use the .NET Secret Manager, environment variables, or Azure Key Vault;
  never hardcode credentials in source.
severity: error
metadata:
  cwe: "CWE-798: Use of Hard-coded Credentials"
  owasp: "A07:2021 - Identification and Authentication Failures"
  category: hardcoded-credentials
  ai_specific: true
  confidence: HIGH
  rule_version: "1.0"
rule:
  any:
    - pattern: string $KEY = "$VALUE"
    - pattern: var $KEY = "$VALUE"
    - pattern: readonly string $KEY = "$VALUE"
    - pattern: const string $KEY = "$VALUE"
    - pattern: static string $KEY = "$VALUE"
    - pattern: static readonly string $KEY = "$VALUE"
  not:
    any:
      - pattern: string $KEY = Environment.GetEnvironmentVariable($ENV)
      - pattern: var $KEY = Environment.GetEnvironmentVariable($ENV)
      - pattern: string $KEY = ConfigurationManager.AppSettings[$KEY]
      - pattern: string $KEY = builder.Configuration[$KEY]
constraints:
  KEY:
    regex: "(?i).*(api_key|apikey|api_token|apitoken|token|secret|credential|authkey|auth_key|accesskey|access_key|privatekey|private_key|clientsecret|client_secret|bearer).*"
  VALUE:
    regex: "((sk-(proj-)?[A-Za-z0-9_\\-]{32,})|(sk-ant-[A-Za-z0-9_\\-]{32,})|(hf_[A-Za-z0-9]{32,})|([A-Za-z0-9+/=_\\-]{40,}))"
