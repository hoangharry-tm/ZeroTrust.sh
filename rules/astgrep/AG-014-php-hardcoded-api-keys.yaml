id: AG-014-php-hardcoded-api-keys
language: php
message: >
  A string literal that appears to be an API key is assigned to a variable or
  defined constant with a credential-suggestive name. Hardcoded keys in PHP
  are exposed in version control and production stack traces.
  Fix: use environment variables via getenv() or $_ENV.
severity: error
metadata:
  cwe: "CWE-798: Use of Hard-coded Credentials"
  owasp: "A07:2021 - Identification and Authentication Failures"
  category: hardcoded-credentials
  ai_specific: true
  confidence: HIGH
  rule_version: "1.0"
rule:
  kind: assignment_expression
  pattern: $VAR = $VALUE
  not:
    any:
      - pattern: $VAR = getenv($ENV)
      - pattern: $VAR = $_ENV[$ENV]
      - pattern: $VAR = $_SERVER[$ENV]
constraints:
  VAR:
    regex: "(?i).*(api_key|apikey|api_token|apitoken|token|secret|credential|auth_key|authkey|access_key|accesskey|private_key|privatekey|client_secret|clientsecret|bearer).*"
