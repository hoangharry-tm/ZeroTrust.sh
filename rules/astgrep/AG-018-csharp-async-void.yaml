# AI-specific Unique Rule
# Why unique: Roslyn analyzers warn about async void in general, but no
# existing tool specifically flags async void in security-related methods
# where exceptions (including auth failures) crash the process instead of
# being catchable by the caller.
#
# Attack scenario:
#   AI agent writes `public async void ValidateToken(string token) { ... }`.
#   An exception during validation becomes an unhandled crash rather than
#   a catchable error, potentially causing denial of service in auth paths.
id: AG-018-csharp-async-void
language: csharp
message: |
  Method with a security-related name uses `async void` instead of
  `async Task`. Exceptions in async void methods are uncatchable and
  crash the process. AI coding agents frequently use `async void` as a
  shortcut for fire-and-forget operations.
  Fix: change return type to `async Task` or `async Task<bool>`.
severity: error
metadata:
  cwe: "CWE-248: Uncaught Exception"
  owasp: "A07:2021 - Identification and Authentication Failures"
  category: cheat-detection
  ai_specific: true
  confidence: HIGH
  rule_version: "1.0"
rule:
  pattern: async void $NAME($$$ARGS) { $$$BODY }
