# AI-specific Unique Rule
# Why unique: No existing Python linter (pylint, flake8, bandit) specifically warns
# about truthiness checks in security functions where `if user_id:` or `if token:`
# could be bypassed by falsy values (0, "", [], None). AI agents overuse Python
# truthiness as a "concise" guard pattern.
#
# Attack scenario:
#   AI agent writes: `if user_id:` as a guard check. When user_id=0 (a valid user
#   in many databases), the condition is falsy and the auth is bypassed. The same
#   applies to empty-string tokens and zero-length session IDs.
#   Fix: use explicit `is not None` for IDs and singletons, `!= ""` for strings.
id: AG-025-python-truthiness-auth-bypass
language: python
message: |
  Truthiness check on a potentially falsy value in a security context.
  `if user_id:` evaluates to False when user_id=0, which may be a valid user ID.
  `if token:` evaluates to False when token="" or token=None.
  AI coding agents frequently use truthiness as a "concise" guard, but the
  implicit type coercion creates authentication bypasses for falsy values.
  Fix: use `is not None` for identifiers, `!= ""` for strings.
severity: warning
metadata:
  cwe: "CWE-697: Incorrect Comparison"
  owasp: "A01:2021 - Broken Access Control"
  category: cheat-detection
  ai_specific: true
  confidence: MEDIUM
  rule_version: "1.0"
rule:
  all:
    - inside:
        kind: function_definition
        stop_by: end
    - any:
        - pattern: if $ID:
        - pattern: if not $ID:
    - has:
        any:
          - pattern: if $ID == "true"
          - pattern: if $ID == True
          - pattern: if $ID is not None
