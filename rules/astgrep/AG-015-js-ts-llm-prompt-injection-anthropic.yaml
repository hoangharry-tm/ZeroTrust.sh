id: AG-015-js-ts-llm-prompt-injection-anthropic
language: typescript
message: >
  An Anthropic SDK messages.create() call receives template-literal content
  inside a system or assistant message. If the interpolated value originates
  from user input, prompt injection is possible.
  Fix: pass user data only in user-role messages; never in system messages.
severity: error
metadata:
  cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command"
  owasp: "A03:2021 - Injection"
  category: llm-prompt-injection
  ai_specific: true
  confidence: HIGH
  rule_version: "1.0"
rule:
  any:
    - pattern: $CLIENT.messages.create($ARGS)
    - pattern: $ANTHROPIC.messages.create($ARGS)
