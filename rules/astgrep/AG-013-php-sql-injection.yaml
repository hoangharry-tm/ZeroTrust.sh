id: AG-013-php-sql-injection
language: php
message: >
  A SQL query is executed via mysqli_query, $db->query, or PDO::query using a
  string built via concatenation or interpolation. If any value originates from
  user input, SQL injection is possible.
  Fix: use prepared statements with bound parameters via PDO or MySQLi.
severity: error
metadata:
  cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
  owasp: "A03:2021 - Injection"
  category: sql-injection
  ai_specific: true
  confidence: HIGH
  rule_version: "1.0"
rule:
  any:
    - pattern: mysqli_query($CONN, $SQL)
    - pattern: $DB->query($SQL)
    - pattern: $DB->exec($SQL)
    - pattern: $PDO->query($SQL)
    - pattern: $PDO->exec($SQL)
    - pattern: $DB->raw($SQL)
  not:
    any:
      - pattern: mysqli_query($CONN, "$STATIC")
      - pattern: $DB->query("$STATIC")
      - pattern: $PDO->prepare($SQL)
      - pattern: $DB->prepare($SQL)
