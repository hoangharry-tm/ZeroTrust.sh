# AI-specific Unique Rule
# Why unique: hadolint checks for `ENV` with secrets but doesn't evaluate whether
# the ENV value pattern-matches credential formats (API key prefixes, password
# patterns, JWT-like strings). This rule specifically targets AI-generated
# Dockerfiles where secrets are embedded as build-time ENV variables.
#
# Attack scenario:
#   AI agent generates a Dockerfile with `ENV DB_PASSWORD=P@ssw0rd!` or
#   `ENV OPENAI_KEY=sk-proj-...`. The secret is embedded in the image layer
#   and can be extracted from the image history at any time.
id: AG-024-dockerfile-env-secret
language: docker
message: |
  ENV directive in Dockerfile contains a value that matches credential patterns
  (API key prefix, password, JWT secret). Build-time ENV variables are stored
  in image layers and persist in the image history.
  Fix: use build-time ARG with --secret mount, or Docker Compose env_file;
  never embed credentials in the Dockerfile.
severity: error
metadata:
  cwe: "CWE-798: Use of Hardcoded Credentials"
  owasp: "A05:2021 - Security Misconfiguration"
  category: secrets
  ai_specific: true
  confidence: HIGH
  rule_version: "1.0"
rule:
  any:
    - pattern: ENV $KEY=sk-$VAL
    - pattern: ENV $KEY=sk-proj-$VAL
    - pattern: ENV $KEY=sk-ant-$VAL
    - pattern: ENV $KEY=hf_$VAL
    - pattern: ENV $KEY=AKIA$VAL
