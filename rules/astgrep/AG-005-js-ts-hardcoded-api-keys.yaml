id: AG-005-js-ts-hardcoded-api-keys
language: typescript
message: >
  A string literal matching an AI API key pattern (sk-, sk-ant-, hf_) is assigned
  to a variable. Hardcoded keys in JS/TS source are exposed to browser devtools
  and sourcemaps. Fix: load API keys from environment variables via process.env
  or a secrets manager.
severity: error
metadata:
  cwe: "CWE-798: Use of Hard-coded Credentials"
  owasp: "A07:2021 - Identification and Authentication Failures"
  category: hardcoded-credentials
  ai_specific: true
  confidence: HIGH
  rule_version: "1.0"
rule:
  any:
    - pattern: let $KEY = "$VALUE"
    - pattern: const $KEY = "$VALUE"
    - pattern: var $KEY = "$VALUE"
    - pattern: $OBJ.$KEY = "$VALUE"
  not:
    any:
      - pattern: let $KEY = process.env.$ENV
      - pattern: const $KEY = process.env.$ENV
      - pattern: var $KEY = process.env.$ENV
      - pattern: let $KEY = import.meta.env.$ENV
      - pattern: const $KEY = import.meta.env.$ENV
      - pattern: $KEY = process.env.$ENV
constraints:
  KEY:
    regex: "(?i).*(api_key|apikey|api_token|apitoken|token|secret|credential|authkey|auth_key|accesskey|access_key|privatekey|private_key|clientsecret|client_secret|bearer).*"
  VALUE:
    regex: "((sk-(proj-)?[A-Za-z0-9_\\-]{32,})|(sk-ant-[A-Za-z0-9_\\-]{32,})|(hf_[A-Za-z0-9]{32,})|([A-Za-z0-9+/=_\\-]{40,}))"
