# Variants covered: V1 V2 V4 V5 V7
# Variants NOT covered:
#   V3 (dynamic property access: obj[keyName] — FP risk)
#   V6 (conditional: let key = flag ? "hardcoded" : loadFromKeychain() — path-sensitive)
#
# Detection strategy:
#   Rules match Swift let/var declarations with credential-suggestive names
#   and non-empty literal values. Name and value patterns checked via separate rules.
#
# KNOWN LIMITATIONS:
#   - Cannot combine name + value constraints in a single ast-grep pattern without
#     taint; two separate rules fire and reviewers verify both name AND value match.
#   - Multiline string literals (triple-quote) not covered by string_literal kind.
id: AG-003-swift-hardcoded-api-keys
language: swift
message: |
  A String literal that appears to be an API key, secret, token, or password is
  assigned to a variable or constant with a credential-suggestive name. Hardcoded
  credentials in Swift source are compiled into the binary and can be extracted
  via binary analysis tools (strings, class-dump, Frida).
  Fix: store credentials in the iOS Keychain (KeychainAccess, Security framework);
  retrieve API keys at runtime from your backend; never hardcode secrets in source.
severity: error
metadata:
  cwe: "CWE-798: Use of Hard-coded Credentials"
  owasp: "A07:2021 - Identification and Authentication Failures"
  category: hardcoded-credentials
  ai_specific: true
  confidence: MEDIUM
  rule_version: "1.0"
# Matches variables with credential-related names assigned any string literal.
# Reviewers should verify the value matches a known key prefix (sk-, hf_, etc.).
rule:
  any:
    - pattern: let $CRED = "$VALUE"
    - pattern: static let $CRED = "$VALUE"
    - pattern: static var $CRED = "$VALUE"
    - pattern: var $CRED = "$VALUE"
    - pattern: $SELF.$CRED = "$VALUE"
  not:
    any:
      - pattern: let $CRED = ProcessInfo.processInfo.environment["$KEY"]
      - pattern: let $CRED = Bundle.main.infoDictionary?["$KEY"] as? String
# Filter $CRED to only match credential-suggestive variable names
constraints:
  CRED:
    regex: "(?i)(password|passwd|secret|apikey|api_key|token|credential|authkey|auth_key|accesskey|access_key|privatekey|private_key|clientsecret|client_secret|bearer|apitoken|api_token|appkey|app_key)"
