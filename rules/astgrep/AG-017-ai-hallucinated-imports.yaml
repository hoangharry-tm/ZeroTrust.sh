# Variants covered: V1 V2
# Variants NOT covered:
#   V3 (dynamic import via __import__() — requires value tracing; Path B)
#
# Detection strategy:
#   Detects import statements where the module name matches patterns common in
#   AI-hallucinated packages: combining well-known library names, using AI/generic
#   keywords (neural, quantum, ai, llm, gpt, crypto, blockchain) with SDK/Pro/Ultimate
#   suffixes, or following the pattern "<adj>-<noun>-<tech>" that LLMs overuse.
#
# Attack scenario:
#   AI coding agents frequently invent package names that sound plausible but don't
#   exist on PyPI/npm. A developer may not verify every dependency. An attacker can
#   register the hallucinated name (dependency confusion) and achieve code execution.
#
# Why this is unique:
#   pip-audit checks known vulnerabilities in real packages; this rule detects
#   packages that look AI-generated BEFORE they become a supply chain risk.
#   No existing tool (bandit, safety, pip-audit, osv-scanner) does this.
id: AG-017-ai-hallucinated-imports
language: python
message: |
  Imported module name matches patterns common in AI-hallucinated packages.
  The name "{{module}}" combines keywords or suffixes that real registries
  rarely use together. This package may not exist on PyPI — an attacker can
  register it to achieve dependency confusion.
  Fix: verify every dependency exists on the official package registry;
  check spelling; prefer well-known libraries.
severity: warning
metadata:
  cwe: "CWE-1104: Use of Unmaintained Third-Party Components"
  owasp: "A06:2021 - Vulnerable and Outdated Components"
  category: supply-chain
  ai_specific: true
  confidence: MEDIUM
  rule_version: "1.0"
rule:
  any:
    # V1 — imports containing "ai_", "_sdk", "_pro" patterns
    - pattern: import $MODULE
    - pattern: from $MODULE import $NAME
    - pattern: from $PKG.$MOD import $NAME
```

