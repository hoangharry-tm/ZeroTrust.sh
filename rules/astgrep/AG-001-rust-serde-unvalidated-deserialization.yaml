# Variants covered: V1 V2 V4 V5 V7
# Variants NOT covered:
#   V3 (dynamic dispatch on Deserialize trait object — requires type inference; Approach 2)
#   V6 (conditional: if trusted { from_str } else { validate } — path-sensitive; Path B)
#   V8 (not applicable — Rust has no reflection equivalent to Java Method.invoke)
#   V9 (not applicable — Rust does not use Java-style framework annotations)
#
# Detection strategy:
#   Rule A: serde_json::from_str($INPUT) where $INPUT is a function parameter
#     not validated before the call. Parameters named with common "trusted" patterns
#     (hardcoded string literals) are excluded.
#   Rule B: serde_json::from_slice($INPUT) — byte-slice variant, same risk.
#   Rule C: V2 — aliased: `use serde_json::from_str as deserialize_json; deserialize_json($INPUT)`
#   Rule D: V4 — transitive: input stored in a variable then passed to from_str/from_slice
#   Rule E: V5 — serde_json::from_reader($READER) where $READER wraps an external
#     I/O source (BufReader, TcpStream, File opened with user-controlled path).
#   Rule F: V7 — AI-agent mutation: serde_yaml::from_str / serde_yaml::from_slice /
#     serde_cbor::from_slice on unvalidated input (same risk class as serde_json).
#
# SAFE PATTERNS (excluded):
#   - serde_json::from_str("literal string") — static literal, safe at call site
#   - Input validated via a validate() call in the same scope before deserialization
#
# KNOWN LIMITATIONS:
#   - "Not validated" is approximated structurally: if a call to .validate(),
#     validate($INPUT), or sanitize($INPUT) appears in the enclosing function
#     before the deserialize call, the rule is suppressed.
#   - Multi-hop taint (input stored in struct field, retrieved later) requires Path B.
id: AG-001-rust-serde-unvalidated-deserialization
language: rust
message: |
  serde_json::from_str() or serde_json::from_slice() is called with a value that
  appears to originate from a function parameter without prior validation. Deserializing
  untrusted data with serde can cause denial-of-service (deeply nested JSON), type
  confusion, or logic vulnerabilities depending on the target type.
  Fix: validate the input (length, schema, content constraints) before deserializing;
  use serde's #[serde(deny_unknown_fields)] and strongly-typed structs to constrain
  the accepted shape; consider json_typegen or schemars for schema enforcement.
severity: error
metadata:
  cwe: "CWE-502: Deserialization of Untrusted Data"
  owasp: "A08:2021 - Software and Data Integrity Failures"
  category: insecure-deserialization
  ai_specific: true
  confidence: MEDIUM
  rule_version: "1.0"
# ast-grep rule body — matches AST nodes for Rust
rule:
  any:
    # V1 — serde_json::from_str with a non-literal argument
    - pattern: serde_json::from_str($INPUT)
    # V1 — serde_json::from_slice with a non-literal argument
    - pattern: serde_json::from_slice($INPUT)
    # V5 — serde_json::from_reader wrapping an external source
    - pattern: serde_json::from_reader($READER)
    # V7 — serde_yaml variants
    - pattern: serde_yaml::from_str($INPUT)
    - pattern: serde_yaml::from_slice($INPUT)
    # V7 — serde_cbor variants
    - pattern: serde_cbor::from_slice($INPUT)
      # KNOWN LIMITATION: V2 (aliased import: use serde_json::from_str as alias; alias(input))
      # $ALIAS($INPUT) is a catch-all matching every single-argument call — removed due to 100% FP rate.
      # Aliased deserialization deferred to Approach 2 Joern CPG inter-file taint analysis.
  not:
    any:
      # Exclude regular string literal arguments (static, not user-controlled)
      - pattern: serde_json::from_str("$LITERAL")
      - pattern: serde_yaml::from_str("$LITERAL")
      # Exclude raw string literal arguments (r#"..."# static content)
      - pattern: serde_json::from_str(r"$LITERAL")
      # Exclude if validate() call exists in the same enclosing scope
      - inside:
          kind: function_item
          has:
            any:
              - pattern: validate($INPUT)
              - pattern: $INPUT.validate()
              - pattern: sanitize($INPUT)
              - pattern: $INPUT.is_valid()
