# Variants covered: V1 V4 V8 V9 V10
# Variants not covered (reason):
#   V2 — N/A (generic mode, no import concept)
#   V3 — N/A (no dynamic attribute access in instruction files)
#   V5 — Partially covered by GN-005 (base64 detection); zero-width chars survive base64 encoding
#          as part of the surrounding text — covered here at the raw byte level
#   V6 — Not covered; conditional forms require semantic understanding beyond pattern-regex
#   V7 — Covered under V9: an AI agent's own instruction syntax can be exploited with invisible
#          chars to create semantic ambiguity that another agent misreads

# Attack scenario:
#   An attacker inserts U+200B (ZERO-WIDTH SPACE) or U+200D (ZERO-WIDTH JOINER) between the
#   characters of a visible directive in a CLAUDE.md file. The text appears visually clean in
#   any standard editor and diff viewer — zero-width characters produce no glyph. However, the
#   LLM tokenizer may split or join tokens at the invisible code point boundaries, altering the
#   semantic meaning of the surrounding words. More concretely: an attacker can use zero-width
#   characters to construct a steganographic channel — encoding a hidden binary payload in the
#   presence/absence of U+200B between visible words (1 = present, 0 = absent). A sophisticated
#   agent that has been primed to decode this channel (via a separate supply-chain compromise)
#   can extract and execute the hidden payload from an otherwise innocuous-looking markdown file.
#
#   U+FEFF (BOM) in the middle of a file (not at position 0) is always suspicious: legitimate
#   UTF-8 BOM only appears at the very start of a file, never mid-content. Mid-file BOM is a
#   known polyglot attack vector used to confuse parsers.
#
#   U+00AD (SOFT HYPHEN) is rendered as invisible in most contexts but may be included in LLM
#   token boundaries, causing words like "ignore" to tokenize differently than expected, allowing
#   keyword filters to miss the directive.
#
#   Variant V9 (semantic disguise): the hidden instruction is syntactically part of a normal
#   English sentence; the zero-width chars steer tokenization so the LLM reads a different
#   imperative than a human reviewer would.

rules:
  - id: GN-002-unicode-zero-width
    message: |
      Invisible Unicode control character detected in an AI agent instruction file. Zero-width
      characters (U+200B, U+200C, U+200D), mid-file BOM (U+FEFF), word joiners (U+2060), and
      soft hyphens (U+00AD) are invisible in editors and diff viewers but are processed by LLM
      tokenizers, enabling steganographic payload encoding and token-boundary manipulation to
      bypass keyword filters. No legitimate AI agent instruction file requires these characters.
      Fix: strip all zero-width and invisible Unicode control characters from the file using a
      tool such as `sed 's/[<200b><200c><feff><2060>]­//g`.
    severity: ERROR
    languages: [generic]
    metadata:
      cwe: "CWE-116: Improper Encoding or Escaping of Output"
      owasp: "LLM01:2025 - Prompt Injection"
      category: instruction-file-injection
      subcategory: unicode-zero-width-steganography
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
      references:
        - "https://www.unicode.org/faq/char_combmark.html"
        - "https://atlas.mitre.org/techniques/AML.T0051"
        - "https://owasp.org/www-project-top-10-for-large-language-model-applications/"
      mitre_atlas: "AML.T0051"
    paths:
      include:
        - "*.md"
        - "*.txt"
        - "*.yaml"
        - "*.yml"
        - "*.json"
        - "*.toml"
        - "AGENTS.md"
        - "CLAUDE.md"
        - "GEMINI.md"
        - "copilot-instructions.md"
        - ".cursor/rules"
        - "*.cursorrules"
        - "*-instructions.md"
        - "*-rules.md"
    # Regex matches the following Unicode code points:
    #   U+200B ZERO-WIDTH SPACE              — E2 80 8B
    #   U+200C ZERO-WIDTH NON-JOINER         — E2 80 8C
    #   U+200D ZERO-WIDTH JOINER             — E2 80 8D
    #   U+FEFF BYTE ORDER MARK (mid-file)    — EF BB BF
    #   U+2060 WORD JOINER                   — E2 81 A0
    #   U+00AD SOFT HYPHEN                   — C2 AD
    # Note: U+FEFF at position 0 (legitimate UTF-8 BOM) produces a false positive.
    # The Go-native check in internal/pattern/instrscan/zero_width.go skips U+FEFF
    # at byte offset 0 to eliminate this false positive; this rule catches all occurrences
    # including mid-file BOM, which the Go check also flags as HIGH confidence.
    pattern-regex: "[​‌‍﻿⁠­]"
