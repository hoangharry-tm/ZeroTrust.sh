# Detection strategy:
#   Detects Go security-related functions that unconditionally return
#   success values (true, nil) without any real security logic.
#   Uses generic (text) mode since OpenGrep processes .go files.
#
# Attack scenario:
#   AI agent generates `func validateToken(token string) (bool, error)`
#   that returns `(true, nil)`. Signature looks correct but function
#   does nothing. Auth is bypassed.
rules:
  - id: GN-010-go-stub-security
    message: |
      Go function with a security-related name returns a hardcoded success
      and nil error, suggesting an AI coding agent stub that was never
      properly implemented.
      Fix: implement the actual security check; the function must have
      real authentication or validation logic.
    severity: ERROR
    languages: [go]
    metadata:
      cwe: "CWE-306: Missing Authentication for Critical Function"
      owasp: "A01:2021 - Broken Access Control"
      category: cheat-detection
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    pattern-either:
      - patterns:
          - pattern-inside: |
              func $FUNC(...) $RET {
                ...
              }
          - metavariable-pattern:
              metavariable: $FUNC
              patterns:
                - pattern-regex: (?i).*(auth|validate|check|verify|login|permission|admin|token|session|authenticate|authorize|is_admin|has_role|can_access).*
          - pattern-either:
              - pattern: return true, nil
              - pattern: return false, nil
              - pattern: return nil
      - patterns:
          - pattern-inside: |
              func $FUNC(...) ($R1, $R2) {
                ...
              }
          - metavariable-pattern:
              metavariable: $FUNC
              patterns:
                - pattern-regex: (?i).*(auth|validate|check|verify|login|permission|admin|token|session|authenticate|authorize|is_admin|has_role|can_access).*
          - pattern-either:
              - pattern: return true, nil
              - pattern: return false, nil
              - pattern: return nil
