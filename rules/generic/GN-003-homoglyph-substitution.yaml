# Variants covered: V1 V4 V8 V10
# Variants not covered (reason):
#   V2 — N/A (generic mode)
#   V3 — N/A (no dynamic attribute access)
#   V5 — Base64 encoding defeats character-level matching; covered by GN-005
#   V6 — Conditional bypass requires semantic context; not detectable by pattern-regex alone
#   V7 — AI agent mutation: an agent could be tricked into writing homoglyphs into its own
#          output; this surfaces as V1 in the written file and is detected by this rule
#   V9 — Semantic disguise that uses homoglyphs to avoid keyword detection is the primary
#          threat model; detected here because the homoglyph character IS the pattern

# Attack scenario:
#   An attacker replaces Latin ASCII characters in critical directive keywords within a
#   CLAUDE.md or GEMINI.md file with visually identical Cyrillic (or other script) lookalikes.
#   Example: the directive "ignore safety rules" becomes "іgnore ѕafety ruleѕ" where
#   'і' is U+0456 (Cyrillic SMALL LETTER BYELORUSSIAN-UKRAINIAN I) and 'ѕ' is U+0455
#   (Cyrillic SMALL LETTER DZE). A human reviewer comparing the file in a diff sees nothing
#   unusual. A keyword-based security scanner using ASCII-only regex misses the match entirely.
#   However, the LLM reads the Unicode code points and semantically processes the word as
#   "ignore" (LLMs are trained on multilingual text and handle confusables correctly).
#   This creates a detection evasion gap: the scanner says clean, the LLM executes the directive.
#
#   This attack is documented under MITRE ATLAS AML.T0051 (Publish Poisoned Artifacts) as a
#   technique used to evade automated content moderation before an artifact reaches an agent.
#   The same technique is used in phishing domains (IDN homograph attack, RFC 3492) and has been
#   adapted to prompt injection by researchers at ETH Zurich (2024).
#
#   Variant V4 (transitive): homoglyphs are inserted into a shared snippet file included by
#   multiple agent instruction files. Scanning only top-level files misses the injection point.
#
#   Top 20 most-used confusable pairs in attacker scenarios (Unicode Confusables database):
#   ─────────────────────────────────────────────────────────────────────────────────────────
#   RANK  LATIN   LOOKALIKE              UNICODE        SCRIPT
#    1    a       а (Cyrillic a)         U+0430         Cyrillic
#    2    e       е (Cyrillic ie)        U+0435         Cyrillic
#    3    o       о (Cyrillic o)         U+043E         Cyrillic
#    4    p       р (Cyrillic er)        U+0440         Cyrillic
#    5    c       с (Cyrillic es)        U+0441         Cyrillic
#    6    x       х (Cyrillic ha)        U+0445         Cyrillic
#    7    i       і (Cyrillic i, Ukr.)   U+0456         Cyrillic
#    8    s       ѕ (Cyrillic dze)       U+0455         Cyrillic
#    9    y       у (Cyrillic u)         U+0443         Cyrillic
#   10    B       В (Cyrillic ve)        U+0412         Cyrillic
#   11    H       Н (Cyrillic en)        U+041D         Cyrillic
#   12    M       М (Cyrillic em)        U+041C         Cyrillic
#   13    T       Т (Cyrillic te)        U+0422         Cyrillic
#   14    A       А (Cyrillic A)         U+0410         Cyrillic
#   15    E       Е (Cyrillic IE)        U+0415         Cyrillic
#   16    O       О (Cyrillic O)         U+041E         Cyrillic
#   17    P       Р (Cyrillic ER)        U+0420         Cyrillic
#   18    C       С (Cyrillic ES)        U+0421         Cyrillic
#   19    X       Х (Cyrillic HA)        U+0425         Cyrillic
#   20    K       К (Cyrillic KA)        U+041A         Cyrillic
#
#   Greek confusables also used:
#      o → ο (U+03BF Greek small letter omicron)
#      v → ν (U+03BD Greek small letter nu)
#      u → υ (U+03C5 Greek small letter upsilon)
#      n → η (U+03B7 Greek small letter eta)
rules:
  - id: GN-003-homoglyph-substitution
    message: |
      Non-ASCII lookalike character (homoglyph) detected that is visually identical to ASCII
      in the context of an AI agent instruction file. Attackers substitute Cyrillic or Greek
      characters for Latin ASCII to evade keyword-based security scanners while the LLM still
      processes the intended directive (MITRE ATLAS AML.T0051). Legitimate instruction files
      authored in English should contain only ASCII characters in keywords and directives.
      Fix: normalize the file to NFC Unicode form and validate that all characters in
      directive keywords are within the ASCII range U+0020–U+007E; flag any non-ASCII
      character in a keyword context for manual review.
    severity: ERROR
    languages: [generic]
    metadata:
      cwe: "CWE-116: Improper Encoding or Escaping of Output"
      owasp: "LLM01:2025 - Prompt Injection"
      category: instruction-file-injection
      subcategory: homoglyph-confusable-substitution
      ai_specific: true
      confidence: MEDIUM
      # MEDIUM because: legitimate multilingual files may contain these characters in quoted
      # user-provided content or examples; Go-native NFC normalization + context check
      # (internal/pattern/instrscan/homoglyph.go) raises to HIGH with surrounding-ASCII context
      rule_version: "1.0"
      references:
        - "https://atlas.mitre.org/techniques/AML.T0051"
        - "https://www.unicode.org/reports/tr39/#Confusable_Detection"
        - "https://www.rfc-editor.org/rfc/rfc3492 (IDN homograph attacks)"
      mitre_atlas: "AML.T0051"
    paths:
      include:
        - "*.md"
        - "*.txt"
        - "*.yaml"
        - "*.yml"
        - "*.json"
        - "*.toml"
        - "AGENTS.md"
        - "CLAUDE.md"
        - "GEMINI.md"
        - "copilot-instructions.md"
        - ".cursor/rules"
        - "*.cursorrules"
        - "*-instructions.md"
        - "*-rules.md"
    # Regex matches all 24 Cyrillic + 4 Greek confusables documented above.
    # Lowercase Cyrillic confusables: а е о р с х і ѕ у
    # Uppercase Cyrillic confusables: В Н М Т А Е О Р С Х К
    # Greek confusables: ο ν υ η
    # NOTE: This regex will also fire on legitimate Cyrillic/Greek language content.
    # The Tier 2 embedding similarity check and Go-native homoglyph.go provide context-aware
    # false positive suppression by checking whether the surrounding tokens are ASCII words.
    pattern-regex: "[аеорсхіѕуВНМТАЕОРСХКονυη]"
