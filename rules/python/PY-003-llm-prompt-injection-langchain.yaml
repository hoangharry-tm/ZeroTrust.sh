# Variants covered: V1 V2 V4 V5 V7
# Variants NOT covered:
#   V3 (getattr on chain/template objects — dynamic dispatch, high FP risk)
#   V6 (conditional bypass — handled by Path B semantic layer)
#
# Detection strategy:
#   Rule A (taint): user-controlled sources → PromptTemplate.format_messages /
#     format_prompt / chain.run / chain.invoke sinks.
#   Rule B (patterns): PromptTemplate / ChatPromptTemplate constructed with
#     template= containing f-string or .format() — catches inline V5 forms.
#   Rule C (message objects): SystemMessage / HumanMessage / AIMessage constructed
#     with content that is an f-string or concatenated from user data.
#   Rule D (LlamaIndex): QueryEngine / index.query() / RetrieverQueryEngine with
#     tainted query string.
#
# KNOWN LIMITATIONS:
#   - LCEL (LangChain Expression Language) pipe operator chains (`template | llm`)
#     require dataflow through `__or__` — not reliably detected at pattern level;
#     routed to Path B.
#   - Custom BasePromptTemplate subclasses: not covered (would require class hierarchy
#     analysis — Path B / CPG taint).

rules:
  # ── Rule A: taint mode — user input → LangChain chain execution sinks ───────
  - id: PY-003-llm-prompt-injection-langchain-taint
    message: |
      Unsanitized user-controlled data flows into a LangChain chain execution call
      (`chain.run`, `chain.invoke`, `chain.__call__`, or `prompt.format_messages`).
      An attacker can inject adversarial instructions that override the system prompt
      or alter LLM behaviour.
      Fix: validate and sanitize all user-supplied input before passing it to LangChain
      chain invocations; use input guards or LangChain's built-in input validation hooks.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command"
      owasp: "A03:2021 - Injection"
      category: llm-prompt-injection
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: request.$METHOD(...)
      - patterns:
          - pattern: request.$ATTR
      - patterns:
          - pattern: input(...)
      - patterns:
          - pattern: sys.stdin.read(...)
      - patterns:
          - pattern: sys.stdin.readline(...)
      - patterns:
          - pattern: $REQ.args.get(...)
      - patterns:
          - pattern: $REQ.json
      - patterns:
          - pattern: $REQ.query_params.get(...)
      - patterns:
          - pattern: $REQ.body()
    pattern-sinks:
      # chain.run(user_input)
      - patterns:
          - pattern: $CHAIN.run($TAINTED)
          - focus-metavariable: $TAINTED
      # chain.invoke({"key": user_input})
      - patterns:
          - pattern: $CHAIN.invoke($TAINTED)
          - focus-metavariable: $TAINTED
      # chain.__call__(user_input) — scoped to LLM-related callable names to avoid catch-all FPs
      - patterns:
          - pattern: $CHAIN($TAINTED)
          - metavariable-regex:
              metavariable: $CHAIN
              regex: "(?i)(llm|chain|agent|chat|model|pipeline|executor|engine|runner|query_engine|retriever|qa_chain|conversation)"
          - focus-metavariable: $TAINTED
      # prompt.format_messages(var=user_input)
      - patterns:
          - pattern: $PROMPT.format_messages(...)
      # prompt.format_prompt(var=user_input)
      - patterns:
          - pattern: $PROMPT.format_prompt(...)
      # LlamaIndex query engine
      - patterns:
          - pattern: $ENGINE.query($TAINTED)
          - focus-metavariable: $TAINTED
      - patterns:
          - pattern: $INDEX.query($TAINTED)
          - focus-metavariable: $TAINTED
      # arun / ainvoke async variants
      - patterns:
          - pattern: $CHAIN.arun($TAINTED)
          - focus-metavariable: $TAINTED
      - patterns:
          - pattern: $CHAIN.ainvoke($TAINTED)
          - focus-metavariable: $TAINTED

  # ── Rule B: PromptTemplate / ChatPromptTemplate with f-string template ───────
  - id: PY-003-llm-prompt-injection-langchain-template-fstring
    message: |
      A LangChain `PromptTemplate` or `ChatPromptTemplate` is constructed with a
      `template` string built via f-string or `.format()`, meaning user-controlled
      data is embedded directly in the template definition rather than via safe
      variable substitution.
      Fix: define the template as a static string with named `{input_variables}` and
      supply user data only through the variables dict at invocation time.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command"
      owasp: "A03:2021 - Injection"
      category: llm-prompt-injection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    pattern-either:
      # PromptTemplate.from_template with f-string
      - pattern: |
          PromptTemplate.from_template(f"...$VAR...")
      # PromptTemplate(template=f"...") constructor
      - pattern: |
          PromptTemplate(..., template=f"...$VAR...", ...)
      # PromptTemplate(template="...".format(...))
      - pattern: |
          PromptTemplate(..., template="...".format(...), ...)
      # ChatPromptTemplate.from_template with f-string
      - pattern: |
          ChatPromptTemplate.from_template(f"...$VAR...")
      # ChatPromptTemplate.from_messages with f-string in tuple
      - pattern: |
          ChatPromptTemplate.from_messages([..., ($ROLE, f"...$VAR..."), ...])
      # ChatPromptTemplate.from_messages with .format() in tuple
      - pattern: |
          ChatPromptTemplate.from_messages([..., ($ROLE, "...".format(...)), ...])

  # ── Rule C: Message objects (SystemMessage, HumanMessage) with tainted content
  - id: PY-003-llm-prompt-injection-langchain-messages
    message: |
      A LangChain `SystemMessage`, `HumanMessage`, or `AIMessage` is constructed
      with a `content` value built via f-string or string concatenation, potentially
      embedding unsanitized user input directly in the message role.
      Fix: sanitize user-controlled data before including it in message content;
      prefer passing user input only in `HumanMessage` with a clearly-scoped role,
      never in `SystemMessage`.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command"
      owasp: "A03:2021 - Injection"
      category: llm-prompt-injection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    pattern-either:
      # SystemMessage with f-string — highest severity: system prompt injection
      - pattern: SystemMessage(content=f"...$VAR...")
      - pattern: SystemMessage(f"...$VAR...")
      # SystemMessage with .format()
      - pattern: SystemMessage(content="...".format(...))
      # SystemMessage with concatenation
      - pattern: SystemMessage(content=$A + $B)
      # HumanMessage with f-string (lower severity but flag for review)
      - pattern: HumanMessage(content=f"...$VAR...")
      # AIMessage prefill injection
      - pattern: AIMessage(content=f"...$VAR...")

  # ── Rule D: LlamaIndex QueryEngine — inline query construction ───────────────
  - id: PY-003-llm-prompt-injection-llamaindex
    message: |
      A LlamaIndex query engine or index is queried with a string built via f-string
      or `.format()`, potentially embedding unsanitized user input in the query.
      LlamaIndex forwards this string to an LLM, enabling prompt injection.
      Fix: sanitize user-controlled data and avoid embedding it directly in
      LlamaIndex query strings; validate query structure before dispatch.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command"
      owasp: "A03:2021 - Injection"
      category: llm-prompt-injection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    pattern-either:
      # QueryEngine.query with f-string
      - pattern: $ENGINE.query(f"...$VAR...")
      # RetrieverQueryEngine.query with f-string
      - pattern: $ENGINE.query("...".format(...))
      # index.as_query_engine().query(f-string)
      - pattern: $INDEX.as_query_engine().query(f"...$VAR...")
      # index.query with concatenation
      - pattern: $INDEX.query($A + $B)
