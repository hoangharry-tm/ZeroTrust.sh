# Variants covered: V1 V5 V7
# Variants NOT covered:
#   V2 (aliased function names — covered by broad name regex in pattern-inside)
#   V3 (dynamic dispatch — not detectable at comment/AST level)
#   V4 (TODO in calling function, skip in callee) — Path B semantic layer
#   V6 (conditional: if debug: pass) — Rule C partially covers this
#
# Detection strategy:
#   OpenGrep cannot natively correlate a comment on line N with a statement on
#   line N+1 in AST mode.  We use a combination of:
#     Rule A: `pass` as the sole statement in a function body that also has a
#       docstring or comment containing TODO/FIXME/HACK — detects "skeleton" stubs.
#     Rule B: return None / return / return {} / return [] as sole or near-sole
#       statement in a function body containing a security call name in its scope.
#     Rule C: commented-out validation — line starting with `# validate` / `# check`
#       / `# sanitize` / `# assert` inside a security-named function body.
#     Rule D (generic mode): regex to find TODO/FIXME comment followed within 3
#       lines by pass/return — captured via pattern matching on the statement block.
#
# KNOWN LIMITATIONS:
#   - The "within 3 lines" requirement for correlating TODO comment + skip statement
#     cannot be precisely expressed in OpenGrep AST mode; we approximate by requiring
#     both to appear in the same function body.  Generic-mode regex would be needed
#     for exact line proximity, but carries high FP risk across all file types.
#   - Commented-out validation (Rule C) only catches single-line comments, not
#     multi-line block comments.
rules:
  # ── Rule A: pass-only function body with security name (stub detection) ───────
  - id: PY-009-cheat-todo-then-skip-pass-stub
    message: |
      A security-sensitive function (`*validate*`, `*sanitize*`, `*check*`, etc.)
      has `pass` as its only body statement, indicating it was stubbed out and
      never implemented.  AI coding agents frequently generate these stubs when
      asked to scaffold security controls, and they remain unimplemented.
      Fix: implement the actual validation/sanitization logic; use
      `raise NotImplementedError` with a linked issue if deferral is genuinely
      necessary, to make the gap visible in production crash reports.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-20: Improper Input Validation"
      owasp: "A03:2021 - Injection"
      category: ai-cheat-detection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    paths:
      exclude:
        - "**/test_*.py"
        - "**/tests/**"
        - "**/conftest.py"
        - "**/*_test.py"
    patterns:
      - pattern: |
          def $FUNC_NAME(...):
              pass
      - metavariable-regex:
          metavariable: $FUNC_NAME
          regex: ".*(validate|sanitize|check|verify|auth|authenticate|authorize|permission|access|guard|secure|protect|filter|escape|encode).*"
  # ── Rule B: return None / empty return / empty collection as security stub ────
  - id: PY-009-cheat-todo-then-skip-return-none
    message: |
      A security-sensitive function returns `None`, an empty collection, or nothing
      at all — effectively a no-op implementation.  Combined with a TODO/FIXME
      comment in the same function, this indicates a skipped security control.
      Fix: implement the actual logic; returning `None` from a validation function
      silently passes all input through unchecked.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-20: Improper Input Validation"
      owasp: "A03:2021 - Injection"
      category: ai-cheat-detection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    paths:
      exclude:
        - "**/test_*.py"
        - "**/tests/**"
        - "**/conftest.py"
        - "**/*_test.py"
    patterns:
      - pattern: |
          def $FUNC_NAME(...):
              return None
      - metavariable-regex:
          metavariable: $FUNC_NAME
          regex: ".*(validate|sanitize|check_input|verify_input|filter_input|clean|escape|encode_input|process_input).*"
      - pattern-not: |
          def $FUNC_NAME(...):
              """..."""
              return None
  # ── Rule C: commented-out validation inside security function ─────────────────
  - id: PY-009-cheat-todo-then-skip-commented-validation
    message: |
      A commented-out validation, assertion, or security check was found inside a
      security-sensitive function.  This pattern (active code replaced with a
      `# validate ...` or `# assert ...` comment) is a strong signal that a
      security control was deliberately removed, often by an AI agent trying to
      avoid a failing test.
      Fix: uncomment and restore the validation; investigate why it was removed
      and whether any data processed while it was absent needs re-validation.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-20: Improper Input Validation"
      owasp: "A03:2021 - Injection"
      category: ai-cheat-detection
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-inside: |
          def $FUNC_NAME(...):
              ...
      - metavariable-regex:
          metavariable: $FUNC_NAME
          regex: ".*(validate|sanitize|check|verify|auth|authenticate|authorize|permission|access|guard|secure|protect|filter).*"
      # Match the literal comment text — OpenGrep supports this for inline comments
      - pattern: |
          # $COMMENT
      - metavariable-regex:
          metavariable: $COMMENT
          regex: ".*(validate|sanitize|check|assert|verify|authenticate|authorize|filter|escape|require_auth|check_permission|jwt\\.verify|token\\.verify).*"
  # ── Rule D: TODO/FIXME/HACK immediately before pass/return in any function ────
  - id: PY-009-cheat-todo-then-skip-generic
    message: |
      A `# TODO`, `# FIXME`, or `# HACK` comment appears directly before a `pass`
      or bare `return` statement, inside a function.  This is the classic AI agent
      pattern of acknowledging a missing implementation with a comment and then
      emitting a no-op to satisfy the parser.
      Fix: implement the required logic or raise `NotImplementedError` with an issue
      reference if deferral is intentional.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-20: Improper Input Validation"
      owasp: "A03:2021 - Injection"
      category: ai-cheat-detection
      ai_specific: true
      confidence: LOW
      rule_version: "1.0"
    patterns:
      - pattern-inside: |
          def $FUNC_NAME(...):
              ...
      - pattern-either:
          - pattern: |
              # $TODO_COMMENT
              pass
          - pattern: |
              # $TODO_COMMENT
              return
          - pattern: |
              # $TODO_COMMENT
              return None
          - pattern: |
              # $TODO_COMMENT
              return True
          - pattern: |
              # $TODO_COMMENT
              return {}
          - pattern: |
              # $TODO_COMMENT
              return []
      - metavariable-regex:
          metavariable: $TODO_COMMENT
          regex: "^(TODO|FIXME|HACK|XXX|BUG|TEMP|TEMPORARY|NOTE|WORKAROUND).*"
