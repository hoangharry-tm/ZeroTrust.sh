# Variants covered: V1 V2 V4
# Variants NOT covered:
#   V3 (eval inside exec inside eval — recursive; Path B semantic analysis)
#   V5 (conditional eval only in one branch — path-sensitive; Path B)
#
# Detection strategy:
#   Rule A (direct): eval() / exec() / compile() called with a variable argument
#     (not a string literal), indicating user-controlled code execution.
#   Rule B (f-string): eval(f"...") / exec(f"...") pattern with string interpolation.
#   Rule C (named exec): exec() with a variable that has a name suggesting user input.
#
# Attack scenario:
#   AI agents sometimes use eval/exec as a "shortcut" for dynamic dispatch,
#   serialization, or plugin loading. This creates arbitrary code execution
#   when any part of the evaluated expression is user-controlled.
rules:
  # ── Rule A: eval/exec with variable argument ──────────────────────────────────
  - id: PY-012-eval-exec-variable
    message: |
      `eval()` or `exec()` is called with a variable argument. If this variable
      originates from user input, an attacker can execute arbitrary Python code.
      AI coding agents frequently introduce eval/exec as a "convenient" pattern for
      dynamic dispatch or serialization.
      Fix: replace eval/exec with a safe alternative — `ast.literal_eval()` for
      data, a dict-based dispatch table for functions, or `json.loads()` for
      serialized data.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"
      owasp: "A03:2021 - Injection"
      category: code-execution
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-either:
          - pattern: eval($VAR)
          - pattern: exec($VAR)
          - pattern: compile($VAR, ...)
          - pattern: eval(compile($VAR, ...))
      - metavariable-pattern:
          metavariable: $VAR
          patterns:
            - pattern-not: "..."
            - pattern-not: '...'
      - focus-metavariable: $VAR

  # ── Rule B: eval/exec with f-string interpolation ────────────────────────────
  - id: PY-012-eval-exec-fstring
    message: |
      `eval()` or `exec()` is called with an f-string argument. F-string
      interpolation in eval/exec is almost always a code execution vulnerability
      because the interpolated values are evaluated as code rather than data.
      Fix: pass data as arguments, never as code.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"
      owasp: "A03:2021 - Injection"
      category: code-execution
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-either:
          - pattern: eval(f"...")
          - pattern: exec(f"...")
          - pattern: compile(f"...", ...)

  # ── Rule C: exec with shell=True or os.system / subprocess shell patterns ────
  - id: PY-012-subprocess-shell-true
    message: |
      `subprocess.call/run/Popen` with `shell=True` and a variable command string.
      This allows an attacker controlling any part of the command string to execute
      arbitrary system commands.
      Fix: avoid `shell=True`; pass arguments as a list.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-78: Improper Neutralization of Special Elements used in an OS Command"
      owasp: "A03:2021 - Injection"
      category: code-execution
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-either:
          - patterns:
              - pattern: subprocess.call($CMD, ...)
              - pattern: subprocess.call($CMD, shell=True, ...)
          - patterns:
              - pattern: subprocess.run($CMD, ...)
              - pattern: subprocess.run($CMD, shell=True, ...)
          - patterns:
              - pattern: subprocess.Popen($CMD, ...)
              - pattern: subprocess.Popen($CMD, shell=True, ...)
          - pattern: os.system($CMD)
          - pattern: os.popen($CMD)
      - metavariable-pattern:
          metavariable: $CMD
          patterns:
            - pattern-not: '"..."'
            - pattern-not: "'...'"
      - focus-metavariable: $CMD
