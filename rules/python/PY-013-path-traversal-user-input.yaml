# Variants covered: V1 V2 V4
# Variants NOT covered:
#   V3 (path composed from multiple intermediate variables — requires value tracing)
#   V5 (conditional path traversal — path-sensitive; Path B)
#
# Detection strategy:
#   Rule A (open): detects open(file_var) / open(Path(file_var)) where file_var
#     originates from user input in request handlers.
#   Rule B (file-ops): os.remove/unlink/rename with user-controlled path.
#   Rule C (pathlib): Path(file_var).read_text/write_bytes with user-controlled path.
#
# Attack scenario:
#   AI agents frequently generate file operations where the file path is derived
#   from URL parameters or request body fields. This allows an attacker to read,
#   write, or delete files outside the intended directory.
rules:
  # ── Rule A: open() with user-controlled path in request handlers ─────────────
  - id: PY-013-path-traversal-open
    message: |
      `open()` is called with a variable that may contain user-controlled input.
      An attacker can craft a path like `../../etc/passwd` to read or write files
      outside the intended directory.
      Fix: validate the path against an allowlist, use `os.path.realpath()` and
      ensure it starts with the allowed base directory.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-22: Improper Limitation of a Pathname to a Restricted Directory"
      owasp: "A01:2021 - Broken Access Control"
      category: path-traversal
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-either:
          - pattern: open($PATH, ...)
          - pattern: open($PATH)
      - metavariable-pattern:
          metavariable: $PATH
          patterns:
            - pattern-not: '"..."'
            - pattern-not: "'...'"
            - pattern-not: 'f".../..."'
      - focus-metavariable: $PATH

  # ── Rule B: os file operations with user-controlled path ─────────────────────
  - id: PY-013-path-traversal-os-ops
    message: |
      An OS file operation (`os.remove`, `os.unlink`, `os.rename`, `shutil.move`,
      `os.chmod`) is called with a variable path. User-controlled file paths enable
      path traversal attacks.
      Fix: validate the resolved path is within the intended directory.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-22: Improper Limitation of a Pathname to a Restricted Directory"
      owasp: "A01:2021 - Broken Access Control"
      category: path-traversal
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-either:
          - pattern: os.remove($PATH)
          - pattern: os.unlink($PATH)
          - pattern: os.rename($PATH, ...)
          - pattern: shutil.move($PATH, ...)
          - pattern: os.chmod($PATH, ...)
          - pattern: os.path.exists($PATH)
      - metavariable-pattern:
          metavariable: $PATH
          patterns:
            - pattern-not: '"..."'
            - pattern-not: "'...'"
      - focus-metavariable: $PATH

  # ── Rule C: pathlib operations with user-controlled path ─────────────────────
  - id: PY-013-path-traversal-pathlib
    message: |
      A `pathlib.Path()` operation reads/writes a file at a user-controlled path.
      An attacker can traverse directories to access files outside the intended scope.
      Fix: resolve the path and verify it stays within the allowed base directory.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-22: Improper Limitation of a Pathname to a Restricted Directory"
      owasp: "A01:2021 - Broken Access Control"
      category: path-traversal
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    patterns:
      - patterns:
          - pattern: $P.read_text(...)
          - pattern-inside: |
              $P = Path($VAR)
              ...
      - metavariable-pattern:
          metavariable: $VAR
          patterns:
            - pattern-not: '"..."'
            - pattern-not: "'...'"
