# Variants covered: V1 V2 V4 V5 V7
# Variants NOT covered:
#   V3 (getattr dynamic dispatch on anthropic module — too broad, high FP risk)
#   V6 (conditional bypass — Path B handles semantic bypasses)
#
# Detection strategy:
#   Rule A (taint): traces user-controlled sources → anthropic messages.create sink,
#     covering both `content` list items and the top-level `system=` kwarg.
#   Rule B (patterns): catches inline f-string / .format() inside messages list
#     or system= kwarg at the call site directly (V5 inline form).
#   Rule C (legacy format): covers the older `human_turn`/`assistant_turn` / HUMAN_PROMPT
#     string-assembly pattern used with anthropic.Anthropic().completions.create().
#
# KNOWN LIMITATIONS:
#   - Async client `anthropic.AsyncAnthropic().messages.create(...)` uses same pattern
#     and is caught by the $CLIENT wildcard.
#   - Multi-hop taint through pre-assembled `content` lists requires Path B.

rules:
  # ── Rule A: taint mode — user input → anthropic messages.create ─────────────
  - id: PY-002-llm-prompt-injection-anthropic-taint
    message: |
      Unsanitized user-controlled data reaches an Anthropic `messages.create` API call.
      An attacker can inject adversarial instructions that override the system prompt
      or manipulate model behaviour.
      Fix: validate and sanitize all user-supplied text before including it in
      `messages` content or the `system` parameter; structurally separate user data
      from prompt instructions.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command"
      owasp: "A03:2021 - Injection"
      category: llm-prompt-injection
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: request.$METHOD(...)
      - patterns:
          - pattern: request.$ATTR
      - patterns:
          - pattern: input(...)
      - patterns:
          - pattern: sys.stdin.read(...)
      - patterns:
          - pattern: sys.stdin.readline(...)
      - patterns:
          - pattern: os.environ.get(...)
      - patterns:
          - pattern: os.environ[...]
      - patterns:
          - pattern: $REQ.args.get(...)
      - patterns:
          - pattern: $REQ.json
      - patterns:
          - pattern: $REQ.query_params.get(...)
      - patterns:
          - pattern: $REQ.body()
    pattern-sinks:
      # New SDK: client.messages.create — content kwarg
      - patterns:
          - pattern: $CLIENT.messages.create(..., messages=$MSGS, ...)
          - focus-metavariable: $MSGS
      # New SDK: system= kwarg (injecting into system prompt directly)
      - patterns:
          - pattern: $CLIENT.messages.create(..., system=$SYS, ...)
          - focus-metavariable: $SYS
      # Legacy completions API: prompt= kwarg
      - patterns:
          - pattern: $CLIENT.completions.create(..., prompt=$P, ...)
          - focus-metavariable: $P

  # ── Rule B: inline f-string / .format() at Anthropic call site ──────────────
  - id: PY-002-llm-prompt-injection-anthropic-fstring
    message: |
      An f-string or .format() interpolating a potentially user-controlled variable
      is used directly inside an Anthropic `messages.create` call (in `messages` content
      or `system=` kwarg).
      Fix: sanitize or structurally separate user data from the prompt template before
      interpolation.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command"
      owasp: "A03:2021 - Injection"
      category: llm-prompt-injection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    pattern-either:
      # f-string in messages list content value
      - pattern: |
          $CLIENT.messages.create(..., messages=[..., {"role": $R, "content": f"...$VAR..."}, ...], ...)
      # .format() in messages list content value
      - pattern: |
          $CLIENT.messages.create(..., messages=[..., {"role": $R, "content": "...".format(...)}, ...], ...)
      # f-string in system= kwarg
      - pattern: |
          $CLIENT.messages.create(..., system=f"...$VAR...", ...)
      # .format() in system= kwarg
      - pattern: |
          $CLIENT.messages.create(..., system="...".format(...), ...)
      # string concatenation in system=
      - pattern: |
          $CLIENT.messages.create(..., system=$A + $B, ...)

  # ── Rule C: legacy HUMAN_PROMPT / human_turn string assembly ─────────────────
  - id: PY-002-llm-prompt-injection-anthropic-legacy
    message: |
      User-controlled data is concatenated into an Anthropic `HUMAN_PROMPT` /
      `AI_PROMPT` completion string or `human_turn` variable, which is then passed
      to `completions.create`.  An attacker can inject role-switching sequences
      (e.g. `\n\nHuman:`) to hijack the conversation structure.
      Fix: sanitize user input to strip Anthropic role delimiters
      (`\\n\\nHuman:`, `\\n\\nAssistant:`) before concatenation, or migrate to the
      `messages` API which handles role separation structurally.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command"
      owasp: "A03:2021 - Injection"
      category: llm-prompt-injection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    pattern-either:
      # HUMAN_PROMPT string concatenation pattern
      - pattern: |
          $PROMPT = anthropic.HUMAN_PROMPT + $USER_VAR + ...
      # f-string with HUMAN_PROMPT
      - pattern: |
          $PROMPT = f"...{anthropic.HUMAN_PROMPT}...$VAR..."
      # human_turn variable assembled from user data then passed to completions
      - patterns:
          - pattern: |
              $CLIENT.completions.create(..., prompt=$PROMPT, ...)
          - pattern-inside: |
              $PROMPT = ... + $USER_VAR + ...
