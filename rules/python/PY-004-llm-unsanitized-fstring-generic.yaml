# Variants covered: V1 V4 V5 V7
# Variants NOT covered:
#   V2 (aliased imports resolved at taint source level — covered by taint sources below)
#   V3 (getattr dynamic attribute on LLM objects — too broad, >20% FP risk)
#   V6 (conditional bypass — Path B semantic layer)
#
# Detection strategy:
#   Taint mode: sources = common user-input channels (request.*, input(), environ.*,
#     sys.stdin).  Sinks = function calls whose name matches LLM-related name patterns
#     (llm, chat, complete, generate, prompt, ask, query) PLUS openai.* and anthropic.*
#     namespaced calls, when the tainted value reaches any argument of that call.
#
#   This is the GENERIC catch-all covering LLM libraries not explicitly targeted by
#   PY-001/002/003 (e.g. Cohere, AI21, Mistral Python SDK, VertexAI, Together AI).
#
# KNOWN LIMITATIONS:
#   - Name matching on function names (llm/chat/complete/generate/prompt/ask/query)
#     will flag non-LLM functions with those names. Confidence is set to MEDIUM to
#     reflect this; Path B semantic analysis disambiguates uncertain cases.
#   - Functions named `query` in ORM contexts (SQLAlchemy, Django ORM) are at FP
#     risk — mitigated by pattern-not-inside for ORM import patterns.

rules:
  - id: PY-004-llm-unsanitized-fstring-generic
    message: |
      Unsanitized user-controlled data (from request parameters, environment variables,
      or standard input) flows into a function whose name suggests LLM interaction
      (`*llm*`, `*chat*`, `*complete*`, `*generate*`, `*prompt*`, `*ask*`, `*query*`).
      If this function wraps an LLM API call, an attacker can inject adversarial prompt
      instructions.
      Fix: sanitize all user-supplied data before passing it to LLM-facing functions;
      validate input length and content; consider a prompt injection detection layer.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command"
      owasp: "A03:2021 - Injection"
      category: llm-prompt-injection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    mode: taint
    pattern-sources:
      # Django / Flask / FastAPI request objects
      - patterns:
          - pattern: request.GET.get(...)
      - patterns:
          - pattern: request.POST.get(...)
      - patterns:
          - pattern: request.data
      - patterns:
          - pattern: request.json
      - patterns:
          - pattern: request.form.get(...)
      - patterns:
          - pattern: request.args.get(...)
      - patterns:
          - pattern: request.values.get(...)
      - patterns:
          - pattern: request.body()
      - patterns:
          - pattern: request.query_params.get(...)
      # Generic attribute access on request (catches request.user, request.headers, etc.)
      - patterns:
          - pattern: request.$ANY
      # CLI / interactive input
      - patterns:
          - pattern: input(...)
      # Standard input stream reads
      - patterns:
          - pattern: sys.stdin.read(...)
      - patterns:
          - pattern: sys.stdin.readline(...)
      # argparse parsed values (CLI tools)
      - patterns:
          - pattern: $PARSER.parse_args(...)
    pattern-sinks:
      # Generic LLM-named function calls — name regex matching
      - patterns:
          - pattern: $FUNC($TAINTED, ...)
          - metavariable-regex:
              metavariable: $FUNC
              regex: ".*(llm|chat|complet|generat|prompt|ask|query).*"
          - focus-metavariable: $TAINTED
          # Exclude ORM-style queryset / DB query methods to reduce FP
          - pattern-not-inside: |
              from django.db import models
              ...
          - pattern-not-inside: |
              import sqlalchemy
              ...
      # Method calls on any object with LLM-pattern name
      - patterns:
          - pattern: $OBJ.$METHOD($TAINTED, ...)
          - metavariable-regex:
              metavariable: $METHOD
              regex: ".*(llm|chat|complet|generat|prompt|ask).*"
          - focus-metavariable: $TAINTED
          - pattern-not-inside: |
              from django.db import models
              ...
          - pattern-not-inside: |
              import sqlalchemy
              ...
      # openai.* and anthropic.* namespaced calls (belt-and-suspenders for PY-001/002)
      - patterns:
          - pattern: openai.$ANY(...)
      - patterns:
          - pattern: $ANTHROPIC_CLIENT.messages.create(...)
          - pattern-inside: |
              import anthropic
              ...
