# Variants covered: V1 V2 V4 V5 V7
# Variants NOT covered:
#   V3 (getattr dynamic dispatch on openai module — too broad, ~40% FP risk)
#   V6 (conditional bypass — covered by Path B semantic analysis, not pattern-safe here)
#
# Detection strategy:
#   Rule A (taint): traces user-controlled sources → openai chat/completion sinks.
#   Rule B (patterns): catches f-string and .format() interpolation directly inside
#     the messages list/content kwarg at call sites, where the expression is visibly
#     tainted without full taint propagation (V5 direct inline form).
#   Rule C (aliased client): catches `from openai import OpenAI; client = OpenAI();
#     client.chat.completions.create(...)` aliased patterns.
#
# KNOWN LIMITATIONS:
#   - Multi-hop taint through intermediate dicts not assembled at call site requires
#     Path B semantic depth.  These cases emit no finding from this rule.
#   - `openai.ChatCompletion.acreate` (async) shares the same pattern — covered by
#     the `...` wildcard on the method name in rules B/C.
rules:
  # ── Rule A: taint mode — user input flows into any openai sink ──────────────
  - id: PY-001-llm-prompt-injection-openai-taint
    message: |
      Unsanitized user-controlled data reaches an OpenAI chat/completion API call.
      An attacker can inject adversarial instructions that override the system prompt
      or exfiltrate context via the model's response.
      Fix: validate and sanitize all user-supplied content before including it in
      `messages`; consider a strict allowlist or structural separation of user data
      from prompt instructions.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command"
      owasp: "A03:2021 - Injection"
      category: llm-prompt-injection
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: request.$METHOD(...)
      - patterns:
          - pattern: request.$ATTR
      - patterns:
          - pattern: input(...)
      - patterns:
          - pattern: sys.stdin.read(...)
      - patterns:
          - pattern: sys.stdin.readline(...)
      - patterns:
          - pattern: os.environ.get(...)
      - patterns:
          - pattern: os.environ[...]
      - patterns:
          - pattern: $FLASK_REQ.args.get(...)
          - pattern-inside: |
              from flask import request as $FLASK_REQ
              ...
      - patterns:
          - pattern: $FLASK_REQ.json
          - pattern-inside: |
              from flask import request as $FLASK_REQ
              ...
      - patterns:
          - pattern: $FAST_REQ.query_params.get(...)
      - patterns:
          - pattern: $FAST_REQ.body()
    pattern-sinks:
      # Legacy SDK: openai.ChatCompletion.create / acreate
      - patterns:
          - pattern: openai.ChatCompletion.create(..., messages=$MSGS, ...)
          - focus-metavariable: $MSGS
      - patterns:
          - pattern: openai.ChatCompletion.acreate(..., messages=$MSGS, ...)
          - focus-metavariable: $MSGS
      # Legacy SDK: openai.Completion.create
      - patterns:
          - pattern: openai.Completion.create(..., prompt=$P, ...)
          - focus-metavariable: $P
      # New SDK: client.chat.completions.create
      - patterns:
          - pattern: $CLIENT.chat.completions.create(..., messages=$MSGS, ...)
          - focus-metavariable: $MSGS
      # New SDK: client.completions.create
      - patterns:
          - pattern: $CLIENT.completions.create(..., prompt=$P, ...)
          - focus-metavariable: $P
  # ── Rule B: inline f-string / .format() in messages list literal ────────────
  - id: PY-001-llm-prompt-injection-openai-fstring
    message: |
      An f-string or .format() interpolating a potentially user-controlled variable
      is used directly inside the `messages` list of an OpenAI API call.
      If the interpolated variable originates from user input, an attacker can inject
      arbitrary prompt instructions.
      Fix: sanitize or structurally separate user data from the prompt template before
      interpolation; prefer passing user data as a clearly-labelled user-role message
      rather than embedding it in a system prompt.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command"
      owasp: "A03:2021 - Injection"
      category: llm-prompt-injection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    patterns:
      - pattern-either:
          # Legacy SDK with f-string content
          - pattern: |
              openai.ChatCompletion.create(..., messages=[..., {"role": $ROLE, "content": f"...$VAR..."}, ...], ...)
          # Legacy SDK with .format() content
          - pattern: |
              openai.ChatCompletion.create(..., messages=[..., {"role": $ROLE, "content": "...".format(...)}, ...], ...)
          # New SDK client form with f-string
          - pattern: |
              $CLIENT.chat.completions.create(..., messages=[..., {"role": $ROLE, "content": f"...$VAR..."}, ...], ...)
          # New SDK client form with .format()
          - pattern: |
              $CLIENT.chat.completions.create(..., messages=[..., {"role": $ROLE, "content": "...".format(...)}, ...], ...)
          # Legacy streaming with f-string
          - pattern: |
              openai.ChatCompletion.create(..., messages=[..., {"role": $ROLE, "content": f"...$VAR..."}, ...], stream=True, ...)
          # New SDK streaming with f-string
          - pattern: |
              $CLIENT.chat.completions.create(..., messages=[..., {"role": $ROLE, "content": f"...$VAR..."}, ...], stream=True, ...)
  # ── Rule C: aliased OpenAI import patterns ──────────────────────────────────
  - id: PY-001-llm-prompt-injection-openai-alias
    message: |
      An aliased OpenAI client (imported via `from openai import OpenAI`) calls
      `chat.completions.create` with a `messages` argument that contains an f-string
      or .format() interpolation.
      If the interpolated variable originates from user input, an attacker can inject
      adversarial instructions.
      Fix: sanitize all user-supplied data before injecting it into prompt messages.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command"
      owasp: "A03:2021 - Injection"
      category: llm-prompt-injection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    patterns:
      - pattern-inside: |
          from openai import OpenAI as $ALIAS
          ...
      - pattern-either:
          - pattern: |
              $OBJ.chat.completions.create(..., messages=[..., {"role": $R, "content": f"...$VAR..."}, ...], ...)
          - pattern: |
              $OBJ.chat.completions.create(..., messages=[..., {"role": $R, "content": "...".format(...)}, ...], ...)
