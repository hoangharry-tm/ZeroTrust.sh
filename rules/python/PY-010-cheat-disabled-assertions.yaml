# Variants covered: V1 V2 V5 V7
# Variants NOT covered:
#   V3 (dynamic skip decoration via getattr) — high FP risk, Path B semantic
#   V4 (assertion disabled in a helper called from the test) — Path B
#   V6 (conditional assertion disable: if not DEBUG: assert) — partially covered
#     by Rule D which catches the most dangerous form (always-False assert)
#
# Detection strategy:
#   Rule A: `assert False` or `assert 0` in non-test code — tautologically
#     always-failing assertion; opposite of what assertions should do.
#   Rule B: `assert True` or `assert 1` in non-test code — tautologically
#     always-passing assertion that provides zero safety guarantee.
#   Rule C: @pytest.mark.skip / @unittest.skip on security-named test functions
#     — catches AI agents skipping failing security tests rather than fixing them.
#   Rule D: raise NotImplementedError inside a security primitive function
#     — catches functions whose name promises security but raise on every call.
#   Rule E: -O flag workaround comment — catches `# python -O` comments that
#     document intentional assertion stripping.
#
# KNOWN LIMITATIONS:
#   - `assert condition, "message"` where condition is a variable (not a literal)
#     cannot be evaluated as always-true/false without runtime analysis.
#   - pytest parametrize with skip conditions: not covered, too complex for
#     pattern analysis.
rules:
  # ── Rule A: assert False — assertion that always fails (dead code trap) ───────
  - id: PY-010-cheat-disabled-assertions-assert-false
    message: |
      `assert False` is a tautologically always-failing assertion. In non-test code,
      this either causes unconditional crashes or, when Python is run with the `-O`
      flag (optimization), is silently stripped — leaving code that silently skips
      the check entirely.
      Fix: replace with the actual condition that should be checked, or use
      `raise ValueError(...)` if unconditional failure is intended.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-617: Reachable Assertion"
      owasp: "A05:2021 - Security Misconfiguration"
      category: ai-cheat-detection
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    paths:
      exclude:
        - "**/test_*.py"
        - "**/tests/**"
        - "**/conftest.py"
        - "**/*_test.py"
    patterns:
      - pattern: assert False, ...
  # ── Rule A2: bare assert False without message ────────────────────────────────
  - id: PY-010-cheat-disabled-assertions-assert-false-bare
    message: |
      `assert False` is a tautologically always-failing assertion. Outside of test
      code this is either dead code or a crash site; when Python runs with `-O`
      (assertion optimization), it becomes a silent no-op — the most dangerous case.
      Fix: use an explicit `raise` with a meaningful exception instead.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-617: Reachable Assertion"
      owasp: "A05:2021 - Security Misconfiguration"
      category: ai-cheat-detection
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    paths:
      exclude:
        - "**/test_*.py"
        - "**/tests/**"
        - "**/conftest.py"
        - "**/*_test.py"
    patterns:
      - pattern: assert False
      - pattern-not: assert False, ...
  # ── Rule B: assert True — always-passing assertion (security no-op) ───────────
  - id: PY-010-cheat-disabled-assertions-assert-true
    message: |
      `assert True` (or `assert 1`) is an always-passing assertion that provides no
      safety guarantee whatsoever.  AI coding agents insert these to silence
      assertion-related linting or test failures without implementing the real check.
      Fix: replace with the actual condition being validated; if no check is needed,
      remove the assertion entirely.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-617: Reachable Assertion"
      owasp: "A05:2021 - Security Misconfiguration"
      category: ai-cheat-detection
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    paths:
      exclude:
        - "**/test_*.py"
        - "**/tests/**"
        - "**/conftest.py"
        - "**/*_test.py"
    pattern-either:
      - pattern: assert True
      - pattern: assert True, ...
      - pattern: assert 1
  # ── Rule C: @pytest.mark.skip / @unittest.skip on security test functions ─────
  - id: PY-010-cheat-disabled-assertions-skip-decorator
    message: |
      A security-related test function (`*test_auth*`, `*test_permission*`,
      `*test_security*`, `*test_validation*`, etc.) is decorated with
      `@pytest.mark.skip` or `@unittest.skip`, causing it to be excluded from
      the test suite.  AI coding agents commonly skip failing security tests
      rather than fixing the underlying vulnerability.
      Fix: remove the skip decorator and fix the underlying security issue; if
      skipping is necessary, document the tracking issue in the skip `reason=`
      and set a deadline.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-284: Improper Access Control"
      owasp: "A01:2021 - Broken Access Control"
      category: ai-cheat-detection
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-either:
          # pytest.mark.skip with reason
          - patterns:
              - pattern: |
                  @pytest.mark.skip(...)
                  def $TEST_FUNC(...):
                      ...
              - metavariable-regex:
                  metavariable: $TEST_FUNC
                  regex: ".*(auth|permission|security|validation|access|login|token|credential|encrypt|decrypt|sanitize|privilege|role|admin).*"
          # pytest.mark.skip bare decorator
          - patterns:
              - pattern: |
                  @pytest.mark.skip
                  def $TEST_FUNC(...):
                      ...
              - metavariable-regex:
                  metavariable: $TEST_FUNC
                  regex: ".*(auth|permission|security|validation|access|login|token|credential|encrypt|decrypt|sanitize|privilege|role|admin).*"
          # unittest.skip with reason string
          - patterns:
              - pattern: |
                  @unittest.skip($REASON)
                  def $TEST_FUNC(...):
                      ...
              - metavariable-regex:
                  metavariable: $TEST_FUNC
                  regex: ".*(auth|permission|security|validation|access|login|token|credential|encrypt|decrypt|sanitize|privilege|role|admin).*"
          # pytest.mark.xfail on security tests — silently swallows failures
          - patterns:
              - pattern: |
                  @pytest.mark.xfail(...)
                  def $TEST_FUNC(...):
                      ...
              - metavariable-regex:
                  metavariable: $TEST_FUNC
                  regex: ".*(auth|permission|security|validation|access|login|token|credential).*"
  # ── Rule D: raise NotImplementedError in security primitive functions ──────────
  - id: PY-010-cheat-disabled-assertions-not-implemented
    message: |
      A function with a security-primitive name (`*authenticate*`, `*verify_token*`,
      `*check_permission*`, etc.) raises `NotImplementedError`, meaning every call
      to this function will crash (or, if silently caught upstream, silently skip
      the security control).
      Fix: implement the security primitive; use `raise NotImplementedError` only
      as an abstract method marker in a base class, with a concrete implementation
      in all subclasses that are instantiated.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-284: Improper Access Control"
      owasp: "A01:2021 - Broken Access Control"
      category: ai-cheat-detection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    paths:
      exclude:
        - "**/test_*.py"
        - "**/tests/**"
        - "**/conftest.py"
        - "**/*_test.py"
    patterns:
      - pattern-inside: |
          def $FUNC_NAME(...):
              ...
      - metavariable-regex:
          metavariable: $FUNC_NAME
          regex: ".*(authenticate|verify_token|validate_token|check_permission|check_auth|is_authorized|has_access|authorize|require_permission|enforce_policy|check_signature|verify_signature|decrypt|verify_jwt|check_csrf).*"
      - pattern: raise NotImplementedError(...)
      # Don't flag abstract base class stubs — those are legitimate
      - pattern-not-inside: |
          class $BASE_CLASS(ABC):
              ...
      - pattern-not-inside: |
          class $BASE_CLASS(abc.ABC):
              ...
      - pattern-not-inside: |
          @abstractmethod
          def $FUNC_NAME(...):
              ...
