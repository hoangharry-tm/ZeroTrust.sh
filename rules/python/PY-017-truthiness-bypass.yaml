# Variants covered: V1 V2 V3
# Detection strategy:
#   Detects if-statements where a variable named with common ID/role/token
#   patterns is used as a truthiness check without explicit None/empty check.
#   Truthiness treats 0, "", None, and False as falsy — all of which can
#   be valid values for user_id, token, role, or session variables.
rules:
  - id: PY-017-truthiness-bypass
    message: |
      Truthiness check on a variable that may be falsy for valid values.
      `if {{variable}}:` treats 0, "", None, and False as falsy.
      If {{variable}} is a user_id (can be 0), a token (can be ""), or
      a session ID (can be None), this check can be silently bypassed.
      Fix: use explicit comparison (`is not None`, `!= ""`, `!= 0`).
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-697: Incorrect Comparison"
      owasp: "A01:2021 - Broken Access Control"
      category: cheat-detection
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    patterns:
      - pattern-inside: |
          def $FUNC(...):
            ...
      - pattern-either:
          - pattern: if $VAR:
          - pattern: if not $VAR:
      - metavariable-pattern:
          metavariable: $VAR
          patterns:
            - pattern-regex: ^(user_id|user|token|session|role|is_admin|account|permission|auth|api_key|secret)$
