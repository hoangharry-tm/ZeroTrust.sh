# Variants covered: V1 V2
# Detection strategy:
#   Detects import statements nested inside function bodies in security-related
#   functions. AI agents commonly embed imports inside functions as "quick patches"
#   for missing dependencies, bypassing module-level import checking.
#   This is a strong AI-generation signal.
rules:
  - id: PY-014-import-inside-function
    message: |
      Import statement found inside a function body rather than at module top
      level. This pattern is commonly used by AI coding agents to hide missing
      dependencies — the import only fails when the function is called.
      Fix: move all imports to the module top and declare dependencies
      in requirements.txt or pyproject.toml.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-1104: Use of Unmaintained Third-Party Components"
      owasp: "A06:2021 - Vulnerable and Outdated Components"
      category: supply-chain
      ai_specific: true
      confidence: MEDIUM
      rule_version: "1.0"
    patterns:
      - pattern-either:
          - patterns:
              - pattern-inside: |
                  def $FUNC(...):
                    ...
              - pattern: import $MOD
          - patterns:
              - pattern-inside: |
                  def $FUNC(...):
                    ...
              - pattern: from $MOD import $NAME
          - patterns:
              - pattern-inside: |
                  async def $FUNC(...):
                    ...
              - pattern: import $MOD
          - patterns:
              - pattern-inside: |
                  async def $FUNC(...):
                    ...
              - pattern: from $MOD import $NAME
