# Variants covered: V1 V2 V5 V7
# Variants NOT covered:
#   V3 (getattr dynamic credential assembly — too broad, high FP risk)
#   V4 (transitive: credential built in helper, passed to caller) — Path B taint
#   V6 (conditional credential: if debug: password = "...") — partially covered
#     by V7 pattern below (inline literals still matched)
#
# Detection strategy:
#   Four rule groups:
#     A — password/passwd/secret/pass variable assignments with non-trivial literals
#     B — database connection string literals with embedded credentials
#     C — credential dicts: {"password": "...", "username": "..."} literals
#     D — credential assignment inside class bodies (common in settings/config files)
#
#   Exclusions (pattern-not): os.environ.get, os.getenv, os.environ[],
#     dotenv-loaded values, empty strings, well-known placeholder values
#     ("", "changeme", "password", "secret", "todo", "placeholder", "xxxx").
#
# KNOWN LIMITATIONS:
#   - Excluding "changeme" etc. reduces FP but means an attacker-chosen password that
#     happens to match a placeholder won't fire; this is an acceptable trade-off.
#   - Length filter (≥4 chars in message) is advisory — regex enforces non-trivial
#     length in practice via the placeholder exclusion list.

rules:
  # ── Rule A: password/passwd/secret variable assignments ─────────────────────
  - id: PY-007-hardcoded-credentials-variable
    message: |
      A hardcoded credential is assigned to a variable named `password`, `passwd`,
      `secret`, `pass`, `db_pass`, `db_password`, or similar.  Hardcoded credentials
      are trivially extractable from source code, binaries, and container images.
      Fix: load credentials at runtime from environment variables
      (`os.environ["DB_PASSWORD"]`) or a secrets manager (Vault, AWS Secrets Manager).
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      category: hardcoded-credentials
      ai_specific: false
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern: $VAR = "$CRED"
      - metavariable-regex:
          metavariable: $VAR
          regex: ".*(password|passwd|secret|db_pass|db_secret|pass_key|auth_secret|private_key|priv_key|master_key|admin_pass).*"
      # Exclude correctly-loaded credentials
      - pattern-not: $VAR = os.environ.get(...)
      - pattern-not: $VAR = os.environ[...]
      - pattern-not: $VAR = os.getenv(...)
      # Exclude well-known placeholder / empty / test-only values
      - metavariable-regex:
          metavariable: $CRED
          # Must not be: empty, "changeme", "password", "secret", "todo", "placeholder", "xxxx", "test"
          regex: "^(?!$|changeme|change_me|password|secret|todo|placeholder|xxxx+|test|example|dummy|fake|sample|your_.*|<.*>|\\*+).*[A-Za-z0-9!@#$%^&*]{4,}.*$"

  # ── Rule B: database connection string with embedded credentials ─────────────
  - id: PY-007-hardcoded-credentials-connstring
    message: |
      A database connection string containing embedded credentials (password in URL
      or DSN format) is hardcoded in source code.  Any developer or process with
      read access to the file can extract the database password.
      Fix: use environment variables for the connection string
      (`os.environ["DATABASE_URL"]`) or use a parameterised connection with
      separate credential injection from a secrets store.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      category: hardcoded-credentials
      ai_specific: false
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern: $VAR = "$CONNSTR"
      - metavariable-regex:
          metavariable: $CONNSTR
          # Matches postgres://, mysql://, mongodb://, redis:// with user:password@host
          regex: "(postgres|postgresql|mysql|mongodb|redis|mssql|sqlite)(\\+[a-z]+)?://[^:@/]+:[^@/]{4,}@[^/]+"
      - pattern-not: $VAR = os.environ.get(...)
      - pattern-not: $VAR = os.environ[...]
      - pattern-not: $VAR = os.getenv(...)

  # ── Rule C: credential dict literals ─────────────────────────────────────────
  - id: PY-007-hardcoded-credentials-dict
    message: |
      A dictionary literal contains a `"password"` or `"secret"` key with a
      hardcoded string value.  This pattern is common in database connection dicts,
      OAuth configs, and SMTP configuration blocks.
      Fix: replace the hardcoded value with `os.environ.get("KEY_NAME")` and
      ensure the application handles `None` / missing env var at startup.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      category: hardcoded-credentials
      ai_specific: false
      confidence: MEDIUM
      rule_version: "1.0"
    pattern-either:
      - patterns:
          - pattern: |
              {..., "password": "$CRED", ...}
          - metavariable-regex:
              metavariable: $CRED
              regex: "^(?!$|changeme|change_me|password|secret|todo|placeholder|xxxx+|test|example|dummy|fake|sample|your_.*|<.*>|\\*+).*[A-Za-z0-9!@#$%^&*]{4,}.*$"
      - patterns:
          - pattern: |
              {..., "passwd": "$CRED", ...}
          - metavariable-regex:
              metavariable: $CRED
              regex: "^(?!$|changeme|change_me|password|secret|todo|placeholder|xxxx+|test|example|dummy|fake|sample|your_.*|<.*>|\\*+).*[A-Za-z0-9!@#$%^&*]{4,}.*$"
      - patterns:
          - pattern: |
              {..., "secret": "$CRED", ...}
          - metavariable-regex:
              metavariable: $CRED
              regex: "^(?!$|changeme|change_me|password|secret|todo|placeholder|xxxx+|test|example|dummy|fake|sample|your_.*|<.*>|\\*+).*[A-Za-z0-9!@#$%^&*]{4,}.*$"

  # ── Rule D: credential in Django / Flask settings module ─────────────────────
  - id: PY-007-hardcoded-credentials-settings
    message: |
      A hardcoded credential is assigned at module level in what appears to be a
      settings or configuration file (variable in UPPER_CASE, common in Django
      `settings.py` / Flask config).  Module-level constants are particularly
      dangerous because they are often committed to shared repositories.
      Fix: use `os.environ.get("SECRET_KEY", "")` with a startup guard that
      raises an error if the key is missing in production.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      category: hardcoded-credentials
      ai_specific: false
      confidence: MEDIUM
      rule_version: "1.0"
    patterns:
      - pattern: $VAR = "$CRED"
      - metavariable-regex:
          metavariable: $VAR
          regex: "^(SECRET_KEY|DJANGO_SECRET_KEY|FLASK_SECRET_KEY|DATABASE_PASSWORD|DB_PASSWORD|DB_PASS|SMTP_PASSWORD|REDIS_PASSWORD|JWT_SECRET|SESSION_SECRET|COOKIE_SECRET)$"
      - metavariable-regex:
          metavariable: $CRED
          regex: "^(?!$|changeme|change_me|password|secret|todo|placeholder|xxxx+|test|example|dummy|fake|sample|your_.*|<.*>|\\*+).*[A-Za-z0-9!@#$%^&*]{4,}.*$"
      - pattern-not: $VAR = os.environ.get(...)
      - pattern-not: $VAR = os.environ[...]
      - pattern-not: $VAR = os.getenv(...)
