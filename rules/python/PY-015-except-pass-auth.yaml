# Variants covered: V1 V2
# Detection strategy:
#   Detects `except: pass` or `except Exception: pass` blocks inside
#   functions whose names match security/validation patterns.
#   AI agents silently swallow exceptions in security functions.
rules:
  - id: PY-015-except-pass-auth
    message: |
      Empty except block `except: pass` found in a function with a name
      suggesting authentication, validation, or security logic. Silent
      exception swallowing in security code can hide auth failures.
      Fix: remove the try/except wrapper, log the error, or re-raise.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-391: Unchecked Error Condition"
      owasp: "A04:2021 - Insecure Design"
      category: cheat-detection
      ai_specific: true
      confidence: HIGH
      rule_version: "1.0"
    patterns:
      - pattern-inside: |
          def $FUNC(...):
            ...
      - metavariable-pattern:
          metavariable: $FUNC
          patterns:
            - pattern-regex: (?i).*(auth|validate|check|verify|login|permission|admin|token|session|authenticate|authorize).*
      - pattern-either:
          - pattern: |
              except:
                  pass
          - pattern: |
              except $E:
                  pass
